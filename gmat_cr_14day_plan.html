 Desert'],ans:1,exp:'Official answer: B. See Official Guide explanation for full analysis.'},'OG-736':{num:736,src:'OG',diff:'M',type:'Mixed',p:'Yeasts capable of leavening bread are widespread, and in the many centuries during which the ancient Egyptians made only unleavened bread, such yeasts must frequently have been mixed into bread doughs accidentally. The Egyptians, however, did not discover leavened bread until about 3000 B.C. That discovery roughly coincided with the introduction of a wheat variety that was preferable to previous varieties because its edible kernel could be removed from the husk without first toasting the grain.',q:'Which of the following, if true, provides the strongest evidence that the two developments were causally related?',ch:['Even after the ancient Egyptians discovered leavened bread and the techniques for reliably producing it were well known, unleavened bread continued to be widely consumed.','Only when the Egyptians stopped the practice of toasting grain were their stone-lined grain-toasting pits available for baking bread.','Heating a wheat kernel destroys its gluten, a protein that must be present in order for yeast to leaven bread dough.','The new variety of wheat, which had a more delicate flavor because it was not toasted, was reserved for the consumption of high officials when it first began to be grown.','Because the husk of the new variety of wheat was more easily removed, flour made from it required less effort to produce.'],ans:2,exp:'C: TOASTING destroys gluten, and gluten is NECESSARY for yeast to leaven bread. Old wheat required toasting → gluten destroyed → yeast couldn\'t leaven. New wheat needed no toasting → gluten preserved → leavening possible. The two developments are causally linked via gluten.'},'OG-737':{num:737,src:'OG',diff:'M',type:'Weaken',p:'In parts of the Caribbean, the manatee, an endangered marine mammal, has long been hunted for food. Having noted the manatee hunters’ expert knowledge of manatees’ habits, local conservationists are encouraging the hunters to stop hunting and instead to take tourists on boat rides to see manatees. Many tourists are interested, so the plan has promise of achieving the twin goals of giving the former hunters a good income and helping ensure the manatees’ survival.',q:'Which of the following, if true, raises the most serious doubt about the plan’s chance of success?',ch:['Some tourists who visit these parts of the Caribbean are uninterested in manatees and would not take a boat ride to see them.','Recovery of the species would enable some hunting to continue without putting the manatees’ survival in jeopardy again.','In areas where manatees have traditionally been hunted for food, local people could easily replace the manatee meat in their diets with other foods obtained from the sea.','There would not be enough former manatee hunters to act as guides for all the tourists who want to see manatees.','To maintain a good income guiding tourists, manatee hunters would have to use far larger boats and make many more trips into the manatees’ fragile habitat than they currently do. Questions 738–801 — Difficulty: Hard/2024, 22:25'],ans:4,exp:'E attacks BOTH goals: to earn enough income, ex-hunters would need LARGER BOATS and MANY MORE TRIPS — far more habitat disturbance than current hunting. This could harm manatees MORE than the hunting it replaces.'},'OG-740':{num:740,src:'OG',diff:'H',type:'Complete',p:'',q:'Which of the following most logically completes the passage? Laminated glass is much harder to break than the glass typically used in the windows of cars driven in Relnia. It is more difficult for thieves to break into cars with laminated glass windows than into cars with ordinary glass windows, and laminated glass windows are less likely to break in a collision. Nevertheless, considerations of security and safety do not unambiguously support a proposal to require that in Relnia all glass installed in cars be laminated glass, since __________.?',ch:['most people cannot visually distinguish laminated glass from the glass typically used for car windows','a significant proportion of cars driven in Relnia are manufactured elsewhere/2024, 22:25','some cars in Relnia already have laminated glass in their windows','the rates of car theft and of collisions have both fallen slightly in Relnia in recent years','there are times when breaking a car’s window is the best way to provide timely help for people trapped inside'],ans:4,exp:'E: Sometimes emergency responders NEED to break a car window to rescue trapped people. Laminated glass is much harder to break — this creates a safety RISK in rescue situations. The same hardness that provides security simultaneously compromises rescue capability.'},'OG-742':{num:742,src:'OG',diff:'H',type:'Weaken',p:'To reduce waste of raw materials, the government of Sperland is considering requiring household appliances to be broken down for salvage when discarded. To cover the cost of salvage, the government is planning to charge a fee, which would be imposed when the appliance is first sold. Imposing the fee at the time of salvage would reduce waste more effectively, however, because consumers tend to keep old appliances longer if they are faced with a fee for discarding them.',q:'Which of the following, if true, most seriously weakens the argument?',ch:['Increasing the cost of disposing of an appliance properly increases the incentive to dispose of it improperly.','The fee provides manufacturers with no incentive to produce appliances that are more durable.','For people who have bought new appliances recently, the salvage fee would not need to be paid for a number of years.','People who sell their used, working appliances to others would not need to pay the salvage fee.','Many nonfunctioning appliances that are currently discarded could be repaired at relatively little expense.'],ans:0,exp:'Official answer: A. See Official Guide explanation for full analysis.'},'OG-743':{num:743,src:'OG',diff:'H',type:'Explain',p:'When there is less rainfall than normal, the water level of Australian rivers falls and the rivers flow more slowly. Because algae whose habitat is river water grow best in slow-moving water, the amount of algae per unit of water generally increases when there has been little rain. By/2024, 22:25 contrast, however, following a period of extreme drought, algae levels are low even in very slow-moving river water.',q:'Which of the following, if true, does most to explain the contrast described above?',ch:['During periods of extreme drought, the populations of some of the species that feed on algae tend to fall.','The more slowly water moves, the more conducive its temperature is to the growth of algae.','When algae populations reach very high levels, conditions within the river can become toxic for some of the other species that normally live there.','Australian rivers dry up completely for short intervals in periods of extreme drought.','Except during periods of extreme drought, algae levels tend to be higher in rivers in which the flow has been controlled by damming than in rivers that flow freely.'],ans:3,exp:'D: Australian rivers DRY UP COMPLETELY during extreme drought. No water = no habitat for algae at all. Moderate drought → slow water → algae thrive. Extreme drought → no water → algae impossible. The extreme case eliminates the habitat entirely.'},'OG-744':{num:744,src:'OG',diff:'H',type:'Weaken',p:'Increased use of incineration is sometimes advocated as a safe way to dispose of chemical waste. But opponents of incineration point to the 40 incidents involving unexpected releases of dangerous chemical agents that were reported just last year at two existing incinerators commissioned to destroy a quantity of chemical waste material. Since designs for proposed new incinerators include no additional means of preventing such releases, leaks will only become more prevalent if use of incineration increases.',q:'Which of the following, if true, most seriously weakens the argument?',ch:['At the two incinerators at which leaks were reported, staff had had only cursory training on the proper procedures for incinerating chemical waste.','Other means of disposing of chemical waste, such as chemical neutralization processes, have not been proven safer than incineration.','The capacity of existing incinerators is sufficient to allow for increased incineration of chemical waste without any need for new incinerators.','The frequency of reports of unexpected releases of chemical agents at newly built incinerators is about the same as the frequency at older incinerators.','In only three of the reported incidents of unexpected chemical leaks did the releases extend outside the property on which the incinerators were located.'],ans:0,exp:'A: The 40 incidents occurred at facilities where staff had only CURSORY TRAINING. New incinerators with properly trained staff might have much lower leak rates. The existing rate may be inflated by inadequate training, not by the technology itself.'},'OG-745':{num:745,src:'OG',diff:'H',type:'Analysis',p:'Public health expert: Increasing the urgency of a public health message may be counterproductive. In addition to irritating the majority who already behave responsibly, it may undermine all government pronouncements on health by convincing people that such messages are overly cautious. And there is no reason to believe that those who ignore measured voices will listen to shouting.',q:'The two sections in boldface play which of the following roles in the public health expert’s argument?',ch:['The first is a conclusion for which support is provided, but it is not the argument’s main conclusion; the second is an unsupported premise supporting the argument’s main conclusion.','The first is a premise supporting the only explicit conclusion; so is the second.','The first is the argument’s main conclusion; the second supports that conclusion and is itself a conclusion for which support is provided./2024, 22:25','The first is a premise supporting the argument’s only conclusion; the second is that conclusion.','The first is the argument’s only explicit conclusion; the second is a premise supporting that conclusion.'],ans:4,exp:'First bold: REASON why urgency is counterproductive (a premise). Second (last sentence): \'those who ignore measured voices won\'t listen to shouting\' — THIS IS THE MAIN CONCLUSION. Official answer E: first = premise, second = main conclusion.'},'OG-746':{num:746,src:'OG',diff:'H',type:'Strengthen',p:'Several industries have recently switched at least partly from older technologies powered by fossil fuels to new technologies powered by electricity. It is thus evident that less fossil fuel is being used as a result of the operations of these industries than would have been used if these industries had retained their older technologies.',q:'Which of the following, if true, most strengthens the argument above?',ch:['Many of the industries that have switched at least partly to the new technologies have increased their output.','Less fossil fuel was used to manufacture the machinery employed in the new technologies than was originally used to manufacture the machinery employed in the older technologies.','More electricity is used by those industries that have switched at least partly to the new technologies than by those industries that have not switched.','Some of the industries that have switched at least partly to the new technologies still use primarily technologies that are powered by fossil fuels.','The amount of fossil fuel used to generate the electricity needed to power the new technologies is less than the amount that would have been used to power the older technologies.'],ans:4,exp:'Official answer: E. See Official Guide explanation for full analysis.'},'OG-747':{num:747,src:'OG',diff:'H',type:'Mixed',p:'The difference in average annual income in favor of employees who have college degrees, compared with those who do not have such degrees, doubled between 1980 and 1990. Some analysts have hypothesized that increased competition between employers for employees with college degrees drove up income for such employees.',q:'Which of the following, if true, most seriously undermines the explanation described above?',ch:['During the 1980s a growing percentage of college graduates, unable to find jobs requiring a college degree, took unskilled jobs.','The average age of all employees increased slightly during the 1980s.','The unemployment rate changed very little throughout most of the 1980s.','From 1980 to 1990, the difference in average income between employees with advanced degrees and those with bachelor’s degrees also increased.','During the 1980s there were some employees with no college degree who earned incomes comparable to the top incomes earned by employees with a college degree.'],ans:0,exp:'A: If more and more college graduates were stuck in UNSKILLED JOBS (employers not competing for them), this suggests LOWER competition for college graduates. The hypothesis that increased competition drove up incomes is undermined when many graduates can\'t find degree-relevant work.'},'OG-748':{num:748,src:'OG',diff:'H',type:'Complete',p:'',q:'Which of the following most logically completes the passage? According to the last pre-election poll in Whippleton, most voters believe that the three problems government needs to address, in order of importance, are pollution, crime, and unemployment. Yet in the election, candidates from parties perceived as strongly against pollution were defeated, while those elected were all from parties with a history of opposing legislation designed to reduce pollution. These results should not be taken to indicate that the poll was inaccurate, however, since __________.?',ch:['some voters in Whippleton do not believe that pollution needs to be reduced','every candidate who was defeated had a strong antipollution record/2024, 22:25','there were no issues other than crime, unemployment, and pollution on which the candidates had significant differences of opinion','all the candidates who were elected were perceived as being stronger against both crime and unemployment than the candidates who were defeated','many of the people who voted in the election refused to participate in the poll'],ans:3,exp:'Official answer: D. See Official Guide explanation for full analysis.'},'OG-749':{num:749,src:'OG',diff:'H',type:'Weaken',p:'Manufacturing plants in Arundia have recently been acquired in substantial numbers by investors from abroad. Arundian politicians are proposing legislative action to stop such investment, justifying the proposal by arguing that foreign investors, opportunistically exploiting a recent fall in the value of the Arundian currency, were able to buy Arundian assets at less than their true value.',q:'Which of the following, if true, casts the most serious doubt on the adequacy of the Arundian politicians’ justification for the proposed legislation?',ch:['The Arundian government originally welcomed the fall in the value of the Arundian currency because the fall made Arundian exports more competitive on international markets.','Foreign investors who acquired Arundian manufacturing plants generally did so with no intention of keeping and running those plants over the long term.','Without the recent fall in the value of the Arundian currency, many of the Arundian assets bought by foreign investors would have been beyond the financial reach of those investors.','In Concordia, a country broadly similar to Arundia, the share of manufacturing assets that is foreign-controlled is 60 percent higher than it is in Arundia.','The true value of an investment is determined by the value of the profits from it, and the low value of the Arundian currency has depressed the value of any profits earned by foreign investors from Arundian assets.'],ans:4,exp:'E: The TRUE VALUE of an investment is determined by the profits it generates, and the LOW Arundian currency DEPRESSES the value of those profits when converted back to the investors\' home currency. So investors didn\'t actually get assets \'below true value\' — the low currency makes the profits worth less too. The bargain is illusory.'},'OG-750':{num:750,src:'OG',diff:'H',type:'Mixed',p:'Proposal: Carbon dioxide and methane in the atmosphere block the escape of heat into space. So emission of these “greenhouse” gases contributes to global warming. In order to reduce global warming, emission of greenhouse gases needs to be reduced. Therefore, the methane now emitted from open landfills should instead be burned to produce electricity. Objection: The burning of methane generates carbon dioxide that is released into the atmosphere.',q:'Which of the following, if true, most adequately counters the objection made to the proposal?',ch:['Every time a human being or other mammal exhales, there is some carbon dioxide released into the air.','The conversion of methane to electricity would occur at a considerable distance from the landfills.','The methane that is used to generate electricity would generally be used as a substitute for a fuel that does not produce any greenhouse gases when burned.','Methane in the atmosphere is more effective in blocking the escape of heat from the Earth than is carbon dioxide.','The amount of methane emitted from the landfills could be reduced if the materials whose decomposition produces methane were not discarded but recycled.'],ans:3,exp:'D: Methane is MORE POTENT as a greenhouse gas than CO₂. Converting methane to CO₂ via burning is a NET REDUCTION in greenhouse effect even though CO₂ is released. The objection says CO₂ is released; D shows the trade is favorable because what\'s released (CO₂) is less potent than what was there (methane).'},'OG-751':{num:751,src:'OG',diff:'H',type:'Assumption',p:'Proposed new safety rules for Beach City airport would lengthen considerably the minimum time between takeoffs from the airport. In consequence, the airport would be able to/2024, 22:25 accommodate 10 percent fewer flights than currently use the airport daily. The city’s operating budget depends heavily on taxes generated by tourist spending, and most of the tourists come by plane. Therefore, the proposed new safety rules, if adopted, will reduce the revenue available for the operating budget.',q:'The argument depends on assuming which of the following?',ch:['There are no periods of the day during which the interval between flights taking off from the airport is significantly greater than the currently allowed minimum.','Few, if any, of the tourists who use Beach City airport do so when their main destination is a neighboring community and not Beach City itself.','If the proposed safety rules are adopted, the reduction in tourist numbers will not result mainly from a reduction in the number of tourists who spend relatively little in Beach City.','Increasing the minimum time between takeoffs is the only way to achieve necessary safety improvements without a large expenditure by the city government on airport enhancements.','The response to the adoption of the new safety rules would not include a large increase in the number of passengers per flight.'],ans:4,exp:'Negate E: \'The response WOULD include large increase in passengers per flight.\' Then total tourists could remain the same despite 10% fewer flights. If tourist numbers don\'t fall, the city\'s revenue impact doesn\'t materialize. The argument must assume fewer flights = fewer passengers, not just larger planes.'},'OG-752':{num:752,src:'OG',diff:'H',type:'Mixed',p:'The introduction of new drugs into the market is frequently prevented by a shortage of human subjects for the clinical trials needed to show that the drugs are safe and effective. Since the lives and health of people in future generations may depend on treatments that are currently experimental, practicing physicians are morally in the wrong when, in the absence of any treatment proven to be effective, they fail to encourage suitable patients to volunteer for clinical trials.',q:'Which of the following, if true, casts most doubt on the conclusion of the argument?',ch:['Many drugs undergoing clinical trials are intended for the treatment of conditions for which there is currently no effective treatment.','Patients do not share the physician’s professional concern for public health, but everyone has a moral obligation to alleviate suffering when able to do so.','Usually, half the patients in a clinical trial serve as a control group and receive a nonactive drug in place of the drug being tested.','An experimental drug cannot legally be made available to patients unless those patients are subjects in clinical trials of the drug.','Physicians have an overriding moral and legal duty to care for the health and safety of their current patients.'],ans:4,exp:'E: Physicians have an overriding obligation to CURRENT patients\' health and safety. Enrolling current patients in clinical trials might not be in THOSE patients\' best interest. The higher-priority duty to current patients directly conflicts with the moral condemnation of physicians who don\'t encourage trial participation.'},'OG-753':{num:753,src:'OG',diff:'H',type:'Explain',p:'As a construction material, bamboo is as strong as steel and sturdier than concrete. Moreover, in tropical areas, bamboo is a much less expensive construction material than either steel or concrete and is always readily available. In tropical areas, therefore, building with bamboo makes better economic sense than building with steel or concrete, except where land values are high.',q:'Which of the following, if true, most helps to explain the exception noted above?',ch:['Buildings constructed of bamboo are less likely to suffer earthquake damage than are steel and concrete buildings.','Bamboo is unsuitable as a building material for multistory buildings./2024, 22:25','In order to protect it from being damaged by termites and beetles, bamboo must be soaked, at some expense, in a preservative.','In some tropical areas, bamboo is used to make the scaffolding that is used during large construction projects.','Bamboo growing in an area where land values are increasing is often cleared to make way for construction.'],ans:1,exp:'B: Bamboo cannot be used for MULTISTORY buildings. In high-land-value areas (dense urban areas), buildings MUST be tall to maximize expensive land. If you can\'t go tall, you must spread out (using more expensive land). Steel and concrete enable the tall buildings that make high-land-value areas economically viable.'},'OG-754':{num:754,src:'OG',diff:'H',type:'Strengthen',p:'The country of Virodia has, until now, been barely self-sufficient in both meat and grain. Greater prosperity there has gone hand in hand with steadily increasing per capita consumption of meat, and it takes several pounds of grain used as feed to produce one pound of meat. Per capita income is almost certain to rise further, yet increases in domestic grain production are unlikely.',q:'Which of the following is most strongly supported by the information given?',ch:['Some land in Virodia that is currently used for grain production will soon be turned into pastureland for grazing cattle for meat.','In the future, per capita income in Virodia is unlikely to increase as rapidly as it has in the past.','In Virodia, the amount of grain it takes to produce one pound of meat is likely to increase in coming years.','Grain is soon likely to make up a larger proportion of the average Virodian’s diet than ever before.','Virodia is likely to become an importer of grain or meat or both.'],ans:4,exp:'Chain: rising income → more meat demand + grain needed for meat + grain production won\'t increase + currently barely self-sufficient. Any demand increase that can\'t be met domestically must be imported. E follows necessarily: Virodia will import grain or meat or both.'},'OG-755':{num:755,src:'OG',diff:'H',type:'Strengthen',p:'Newspaper editors should not allow reporters to write the headlines for their own stories. The reason for this is that, while the headlines that reporters themselves write are often clever, what typically makes them clever is that they allude to little-known information that is familiar to the reporter but that never appears explicitly in the story itself.',q:'Which of the following, if true, most strengthens the argument?',ch:['The reporter who writes a story is usually better placed than the reporter’s editor is to judge what the story’s most newsworthy features are.','To write a headline that is clever, a person must have sufficient understanding of the story that the headline accompanies.','Most reporters rarely bother to find out how other reporters have written stories and headlines about the same events that they themselves have covered.','For virtually any story that a reporter writes, there are at least a few people who know more about the story’s subject matter than does the reporter.','The kind of headlines that newspaper editors want are those that anyone who has read a reporter’s story in its entirety will recognize as clever.'],ans:4,exp:'E: Editors want headlines that anyone who READ THE STORY will recognize as clever. Reporters write clever headlines that allude to UNPUBLISHED information. Such headlines are clever only if you have information the story never provided — readers who only read the story won\'t understand the cleverness.'},'OG-756':{num:756,src:'OG',diff:'H',type:'Mixed',p:'Scientists have modified feed corn genetically, increasing its resistance to insect pests. Farmers who tried out the genetically modified corn last season applied less insecticide to their corn fields and still got yields comparable to those they would have gotten with ordinary corn. Ordinary corn seed, however, costs less, and what these farmers saved on insecticide rarely exceeded their extra costs for seed. Therefore, for most feed-corn farmers, switching to genetically modified seed would be unlikely to increase profits.',q:'Which of the following would it be most useful to know in order to evaluate the argument?/2024, 22:25?',ch:['Whether there are insect pests that sometimes reduce feed-corn yields, but against which commonly used insecticides and the genetic modification are equally ineffective','Whether the price that farmers receive for feed corn has remained steady over the past few years','Whether the insecticides typically used on feed corn tend to be more expensive than insecticides typically used on other crops','Whether most of the farmers who tried the genetically modified corn last season applied more insecticide than was actually necessary','Whether, for most farmers who plant feed corn, it is their most profitable crop'],ans:3,exp:'D: If trial farmers used EXCESSIVE insecticide to begin with, their \'savings\' are smaller than typical. For farmers who used normal amounts, savings might routinely EXCEED the extra seed cost. The trial results may not represent typical farmers.'},'OG-759':{num:759,src:'OG',diff:'H',type:'Assumption',p:'In Wareland last year, 16 percent of licensed drivers under 21 and 11 percent of drivers ages 21–24 were in serious accidents. By contrast, only 3 percent of licensed drivers 65 and older were involved in serious accidents. These figures clearly show that the greater experience and developed habits of caution possessed by drivers in the 65-and-older group make them far safer behind the wheel than the younger drivers are.',q:'Which of the following is an assumption on which the argument depends?',ch:['Drivers 65 and older do not, on average, drive very many fewer miles per year than drivers 24 and younger.','Drivers 65 and older do not constitute a significantly larger percentage of licensed drivers in Wareland than drivers ages 18–24 do.','Drivers 65 and older are less likely than are drivers 24 and younger to drive during weather conditions that greatly increase the risk of accidents.','The difference between the accident rate of drivers under 21 and of those ages 21–24 is attributable to the greater driving experience of those in the older group.','There is no age bracket for which the accident rate is lower than it is for licensed drivers 65 and older.'],ans:0,exp:'Negate A: \'65+ drivers DO drive far fewer miles per year.\' Then the lower accident RATE (per licensed driver) simply reflects less driving exposure, not safer behavior. The comparison isn\'t fair without controlling for miles driven.'},'OG-760':{num:760,src:'OG',diff:'H',type:'Mixed',p:'In the past, the country of Malvernia has relied heavily on imported oil. Malvernia recently implemented a program to convert heating systems from oil to natural gas. Malvernia currently produces more natural gas each year than it uses, and oil production in Malvernian oil fields is increasing at a steady pace. If these trends in fuel production and usage continue, therefore, Malvernian reliance on foreign sources for fuel is likely to decline soon.',q:'Which of the following would it be most useful to establish in evaluating the argument?',ch:['When, if ever, will production of oil in Malvernia outstrip production of natural gas?','Is Malvernia among the countries that rely most on imported oil?','What proportion of Malvernia’s total energy needs is met by hydroelectric, solar, and nuclear power?','Is the amount of oil used each year in Malvernia for generating electricity and fuel for transportation increasing?','Have any existing oil-burning heating systems in Malvernia already been converted to natural-gas-burning heating systems?'],ans:3,exp:'Official answer: D. See Official Guide explanation for full analysis.'},'OG-761':{num:761,src:'OG',diff:'H',type:'Assumption',p:'Exposure to certain chemicals commonly used in elementary schools as cleaners or pesticides causes allergic reactions in some children. Elementary school nurses in Renston report that the proportion of schoolchildren sent to them for treatment of allergic reactions to those chemicals has increased significantly over the past ten years. Therefore, either Renston’s schoolchildren have been exposed to greater quantities of the chemicals or they are more sensitive to them than schoolchildren were ten years ago.',q:'Which of the following is an assumption on which the argument depends?',ch:['The number of school nurses employed by Renston’s elementary schools has not decreased over the past ten years./2024, 22:25','Children who are allergic to the chemicals are no more likely than other children to have allergies to other substances.','Children who have allergic reactions to the chemicals are not more likely to be sent to a school nurse now than they were ten years ago.','The chemicals are not commonly used as cleaners or pesticides in houses and apartment buildings in Renston.','Children attending elementary school do not make up a larger proportion of Renston’s population now than they did ten years ago.'],ans:2,exp:'C: Negate — \'Children with reactions ARE MORE LIKELY to be sent to the nurse now.\' If nurses now receive more children for any reaction, the proportion sent could increase even with the SAME actual reaction rate. The argument assumes reporting behavior is unchanged.'},'OG-762':{num:762,src:'OG',diff:'H',type:'Weaken',p:'Lockeport’s commercial fishing boats use gill nets, which kill many of the netted fish, including some fish of endangered species. The fishing commission has proposed requiring the use of tent nets, which do not kill fish; boat crews would then throw back fish of endangered species. Profitable commercial fishing boats in similar areas have already switched over to tent nets. The proposal can therefore be implemented without economic harm to Lockeport’s commercial fishing boat operators.',q:'Which of the following, if true, casts the most serious doubt on the argument made for the proposal?',ch:['In places where the use of tent nets has been mandated, there are typically fewer commercial fishing boats in operation than there were before tent nets came into use.','Even when used properly, gill nets require many more repairs than do tent nets.','Recreational anglers in Lockeport catch more fish of endangered species than do commercial fishing boats.','The endangered species of fish in Lockeport’s commercial fishing area did not become endangered as a result of the use of gill nets by fishing fleets.','The endangered species of fish caught by Lockeport’s commercial fishing fleet are of no commercial value.'],ans:0,exp:'A: After tent nets were mandated elsewhere, there were FEWER commercial fishing boats in operation. Some boats couldn\'t operate profitably under the mandate and shut down. \'Profitable boats chose to switch\' ≠ \'all boats can survive being required to switch.\''},'OG-764':{num:764,src:'OG',diff:'H',type:'Analysis',p:'In countries where automobile insurance includes compensation for whiplash injuries sustained in automobile accidents, reports of having suffered such injuries are twice as frequent as they are in countries where whiplash is not covered. Presently, no objective/2024, 22:25 test for whiplash exists, so it is true that spurious reports of whiplash injuries cannot be readily identified. Nevertheless, these facts do not warrant the conclusion drawn by some commentators that in the countries with the higher rates of reported whiplash injuries, half of the reported cases are spurious. Clearly, in countries where automobile insurance does not include compensation for whiplash, people often have little incentive to report whiplash injuries that they actually have suffered.',q:'In the argument given, the two boldfaced portions play which of the following roles?',ch:['The first is a claim that the argument disputes; the second is a conclusion that has been based on that claim.','The first is a claim that has been used to support a conclusion that the argument accepts; the second is that conclusion.','The first is evidence that has been used to support a conclusion for which the argument provides further evidence; the second is the main conclusion of the argument.','The first is a finding whose implications are at issue in the argument; the second is a claim presented in order to argue against deriving certain implications from that finding.','The first is a finding whose accuracy is evaluated in the argument; the second is evidence presented to establish that the finding is accurate.'],ans:3,exp:'Official answer: D. See Official Guide explanation for full analysis.'},'OG-765':{num:765,src:'OG',diff:'H',type:'Explain',p:'Last year Comfort Airlines had twice as many delayed flights as the year before, but the number of complaints from passengers about delayed flights went up three times. It is unlikely that this disproportionate increase in complaints was rooted in an increase in overall dissatisfaction with the service Comfort Airlines provides, since the airline made a special effort to improve other aspects of its service last year.',q:'Which of the following, if true, most helps to explain the disproportionate increase in customer complaints?',ch:['Comfort Airlines had more flights last year than the year before.','Last year a single period of unusually bad weather caused a large number of flights to be delayed.','Some of the improvements that Comfort Airlines made in its service were required by new government regulations.','The average length of a flight delay was greater last year than it was the year before.','The average number of passengers per flight was no higher last year than the year before.'],ans:3,exp:'D: The average LENGTH of delays was greater last year. Each delay generated more complaints (more frustrated passengers, longer duration). Even with only twice as many delayed flights, each longer delay explains the 3x increase in complaints.'},'OG-766':{num:766,src:'OG',diff:'H',type:'Mixed',p:'Last year a global disturbance of weather patterns disrupted harvests in many of the world’s important agricultural areas. Worldwide production of soybeans, an important source of protein for people and livestock alike, was not adversely affected, however. Indeed, last year’s soybean crop was actually slightly larger than average. Nevertheless, the weather phenomenon is probably responsible for a recent increase in the world price of soybeans.',q:'Which of the following, if true, provides the strongest justification for the attribution of the increase in soybean prices to the weather phenomenon?',ch:['Last year’s harvest of anchovies, which provide an important protein source for livestock, was disrupted by the effects of the weather phenomenon.','Most countries that produce soybeans for export had above-average harvests of a number of food crops other than soybeans last year./2024, 22:25','The world price of soybeans also rose several years ago, immediately after an earlier occurrence of a similar global weather disturbance.','Heavy rains attributable to the weather phenomenon improved grazing pastures last year, allowing farmers in many parts of the world to reduce their dependence on supplemental feed.','Prior to last year, soybean prices had been falling for several years.'],ans:0,exp:'A: Anchovies (a major livestock protein source) were disrupted by the weather. With anchovies scarce, livestock farmers had to use MORE soybeans as feed (substitute). Even though soybean production increased, DEMAND increased even more, driving prices up.'},'OG-767':{num:767,src:'OG',diff:'H',type:'Weaken',p:'Most of the year, the hermit thrush, a North American songbird, eats a diet consisting mainly of insects, but in autumn, as the thrushes migrate to their Central and South American wintering grounds, they feed almost exclusively on wild berries. Wild berries, however, are not as rich in calories as insects, yet thrushes need to consume plenty of calories in order to complete their migration. One possible explanation is that berries contain other nutrients that thrushes need for migration and that insects lack.',q:'Which of the following, if true, most seriously calls into question the explanation given for the thrush’s diet during migration?',ch:['Hermit thrushes, if undernourished, are unable to complete their autumn migration before the onset of winter.','Insect species contain certain nutrients that are not found in wild berries.','For songbirds, catching insects requires the expenditure of significantly more calories than eating wild berries does.','Along the hermit thrushes’ migration routes, insects are abundant throughout the migration season.','There are some species of wild berries that hermit thrushes generally do not eat, even though these berry species are exceptionally rich in calories.'],ans:2,exp:'C: Catching insects requires significantly MORE energy than eating berries. If insects cost more energy to catch than berries provide net, berries are more efficient. The \'special nutrients\' explanation is unnecessary if pure energy efficiency explains the diet shift.'},'OG-768':{num:768,src:'OG',diff:'H',type:'Mixed',p:'The kinds of hand and wrist injuries that result from extended use of a computer while maintaining an incorrect posture are common among schoolchildren in Harnville. Computers are important to the school curriculum there, so instead of reducing the amount their students use computers, teachers plan to bring about a sharp reduction in the number of these injuries by carefully monitoring their students’ posture when using computers in the classroom.',q:'Which of the following would it be most useful to know in order to assess the likelihood that the teachers’ plan will be successful?',ch:['Whether extended use of a computer while maintaining incorrect posture can cause injuries other than hand and wrist injuries','Whether hand and wrist injuries not caused by computer use are common among schoolchildren in Harnville','What proportion of schoolchildren in Harnville with hand and wrist injuries use computers extensively outside the classroom','Whether changes in the curriculum could reduce the schools’ dependence on computers','What proportion of schoolchildren in Harnville already use correct posture while using a computer'],ans:2,exp:'Official answer: C. See Official Guide explanation for full analysis.'},'OG-770':{num:770,src:'OG',diff:'H',type:'Assumption',p:'Many people suffer an allergic reaction to certain sulfites, including those that are commonly added to wine as preservatives. However, since there are several winemakers who add sulfites to none of the wines they produce, people who would like to drink wine but are allergic to sulfites can drink wines produced by these winemakers without risking an allergic reaction to sulfites.',q:'Which of the following is an assumption on which the argument depends?',ch:['These winemakers have been able to duplicate the preservative effect produced by adding sulfites by means that do not involve adding any potentially allergenic substances to their wine.','Not all forms of sulfite are equally likely to produce the allergic reaction.','Wine is the only beverage to which sulfites are commonly added.','Apart from sulfites, there are no substances commonly present in wine that give rise to an allergic reaction.','Sulfites are not naturally present in the wines produced by these winemakers in amounts large enough to produce an allergic reaction in someone who drinks these wines.'],ans:4,exp:'Official answer: E. See Official Guide explanation for full analysis.'},'OG-771':{num:771,src:'OG',diff:'H',type:'Weaken',p:'A new law gives ownership of patents—documents providing exclusive right to make and sell an invention—to universities, not the government, when those patents result from government-sponsored university research. Administrators at Logos University plan to sell any patents they acquire to corporations in order to fund programs to improve undergraduate teaching.',q:'Which of the following, if true, would cast the most doubt on the viability of the college administrators’ plan described above?',ch:['Profit-making corporations interested in developing products based on patents held by universities are likely to try to serve as exclusive sponsors of ongoing university research projects.','Corporate sponsors of research in university facilities are entitled to tax credits under new federal tax-code guidelines.','Research scientists at Logos University have few or no teaching responsibilities and participate little if at all in the undergraduate programs in their field./2024, 22:25','Government-sponsored research conducted at Logos University for the most part duplicates research already completed by several profitmaking corporations.','Logos University is unlikely to attract corporate sponsorship of its scientific research.'],ans:3,exp:'Official answer: D. See Official Guide explanation for full analysis.'},'OG-772':{num:772,src:'OG',diff:'H',type:'Analysis',p:'Since it has become known that several of a bank’s top executives have been buying shares in their own bank, the bank’s depositors, who had been worried by rumors that the bank faced impending financial collapse, have been greatly relieved. They reason that, since top executives evidently have faith in the bank’s financial soundness, those worrisome rumors must be false. Such reasoning might well be overoptimistic, however, since corporate executives have been known to buy shares in their own company in a calculated attempt to dispel negative rumors about the company’s health.',q:'In the argument given, the two boldfaced portions play which of the following roles?',ch:['The first describes evidence that has been taken as supporting a conclusion; the second gives a reason for questioning that support.','The first describes evidence that has been taken as supporting a conclusion; the second states a contrary conclusion that is the main conclusion of the argument.','The first provides evidence in support of the main conclusion of the argument; the second states that conclusion.','The first describes the circumstance that the argument as a whole seeks to explain; the second gives the explanation that the argument seeks to establish.','The first describes the circumstance that the argument as a whole seeks to explain; the second provides evidence in support of the explanation that the argument seeks to establish.'],ans:0,exp:'Official answer: A. See Official Guide explanation for full analysis.'},'OG-773':{num:773,src:'OG',diff:'H',type:'Strengthen',p:'Between 1980 and 2000, the sea otter population of the Aleutian Islands declined precipitously. There were no signs of disease or malnutrition, so there was probably an increase in the number of otters being eaten by predators. Orcas will eat otters when seals, their normal prey, are unavailable, and the Aleutian Islands seal population declined dramatically in the 1980s. Therefore, orcas were most likely the immediate cause of the otter population decline.',q:'Which of the following, if true, most strengthens the argument?',ch:['The population of sea urchins, the main food of sea otters, has increased since the sea otter population declined.','Seals do not eat sea otters, nor do they compete with sea otters for food.','Most of the surviving sea otters live in a bay that is inaccessible to orcas.','The population of orcas in the Aleutian Islands has declined since the 1980s.','An increase in commercial fishing near the Aleutian Islands in the 1980s caused a slight decline in the population of the fish that seals use for food.'],ans:2,exp:'C: Surviving sea otters live in a bay INACCESSIBLE to orcas. If orca predation is the cause, we\'d expect remaining otters to survive in places where orcas cannot reach them. This geographic pattern of survival is exactly what the orca hypothesis predicts.'},'OG-774':{num:774,src:'OG',diff:'H',type:'Mixed',p:'Political strategist: The domestic policies of our opponents in Party X are contrary to the priorities of many middle-class voters. Yet some of these same voters are supporters of Party X and its candidates due to the party’s appeals about foreign policy. In order to win these voters back, we in Party Y must prove to middle-class voters that Party X does not represent their priorities with respect to domestic policy.',q:'Which of the following would, if true, most strongly suggest that the political strategist’s plan is unlikely to succeed?/2024, 22:25?',ch:['Many in the middle class who support Party X for its foreign policies also support its domestic policies and are fully aware of the implications of those policies.','Most middle-class supporters of Party X care about foreign policy and know very little about its domestic policies.','Long-term domestic policy sometimes conflicts with short-term domestic policy.','There are topics on which Party X and Party Y have significant agreement.','Some middle-class voters are concerned about both domestic and foreign policy.'],ans:0,exp:'A: These voters ALREADY KNOW about Party X\'s domestic policies and STILL CHOOSE Party X based on foreign policy. The strategist\'s plan to \'reveal\' domestic failures cannot change the minds of voters who are already fully informed and have made their choice.'},'OG-775':{num:775,src:'OG',diff:'H',type:'Strengthen',p:'Studies in restaurants show that the tips left by customers who pay their bill in cash tend to be larger when the bill is presented on a tray that bears a credit-card logo. Consumer psychologists hypothesize that simply seeing a credit-card logo makes many credit-card holders willing to spend more because it reminds them that their spending power exceeds the cash they have immediately available.',q:'Which of the following, if true, most strongly supports the psychologists’ interpretation of the studies?',ch:['The effect noted in the studies is not limited to patrons who have credit cards.','Patrons who are under financial pressure from their credit-card obligations tend to tip less when presented with a restaurant bill on a tray with a credit-card logo than when the tray has no logo.','In virtually all of the cases in the studies, the patrons who paid bills in cash did not possess credit cards.','In general, restaurant patrons who pay their bills in cash leave larger tips than do those who pay by credit card.','The percentage of restaurant bills paid with a given brand of credit card increases when that credit card’s logo is displayed on the tray with which the bill is presented.'],ans:1,exp:'B: People under FINANCIAL PRESSURE from credit card OBLIGATIONS tip LESS when they see the logo — it reminds them of DEBT. This confirms the logo activates credit-related thinking in both directions: positive credit power → tip more; credit stress → tip less.'},'OG-776':{num:776,src:'OG',diff:'H',type:'Assumption',p:'In an experiment, each volunteer was allowed to choose between an easy task and a hard task and was told that another volunteer would do the other task. Each volunteer could also choose to have a computer assign the two tasks randomly. Most volunteers chose the easy task for themselves and under questioning later said they had acted fairly. But when the scenario was described to another group of volunteers, almost all said choosing the easy task would be unfair. This shows that most people apply weaker moral standards to themselves than to others.',q:'Which of the following is an assumption required by this argument?',ch:['At least some volunteers who said they had acted fairly in choosing the easy task would have said that it was unfair for someone else to do so.','The most moral choice for the volunteers would have been to have the computer assign the two tasks randomly.','There were at least some volunteers who were assigned to do the hard task and felt that the assignment was unfair.','On average, the volunteers to whom the scenario was described were more accurate in their moral judgments than the other volunteers were.','At least some volunteers given the choice between assigning the tasks themselves and having the computer assign them felt that they had made the only fair choice available to them./2024, 22:25'],ans:0,exp:'Negate A: \'None of the first-group volunteers would have said it was unfair for someone else to choose easy.\' If true, both groups hold the same standard — no evidence of weaker self-standards. A is required for the conclusion that people apply weaker moral standards to themselves.'},'OG-777':{num:777,src:'OG',diff:'H',type:'Analysis',p:'Country X’s recent stock-trading scandal should not diminish investors’ confidence in the country’s stock market. For one thing, the discovery of the scandal confirms that Country X has a strong regulatory system, as the following considerations show. In any stock market, some fraudulent activity is inevitable. If a stock market is well regulated, any significant stocktrading fraud in it will very likely be discovered. This deters potential perpetrators and facilitates improvement in regulatory processes.',q:'In the argument, the portion in boldface plays which of the following roles?',ch:['It is the argument’s only conclusion.','It is a conclusion for which the argument provides support and which itself is used to support the argument’s main conclusion.','It is the argument’s main conclusion and is supported by another explicitly stated conclusion for which further support is provided.','It is an assumption for which no explicit support is provided and is used to support the argument’s only conclusion.','It is a compound statement containing both the argument’s main conclusion and an assumption used to support that conclusion.'],ans:1,exp:'B: The boldface \'as the following considerations show\' identifies an INTERMEDIATE CONCLUSION (Country X has a strong regulatory system) that is SUPPORTED by the fraud-detection logic that follows AND USED TO SUPPORT the main conclusion (investors\' confidence should not diminish).'},'OG-778':{num:778,src:'OG',diff:'H',type:'Analysis',p:'Delta Products Inc. has recently switched at least partly from older technologies using fossil fuels to new technologies powered by electricity. The question has been raised whether it can be concluded that for a given level of output, Delta’s operation now causes less fossil fuel to be consumed than it did formerly. The answer, clearly, is yes, since the amount of fossil fuel used to generate the electricity needed to power the new technologies is less than the amount needed to power the older technologies, provided level of output is held constant.',q:'In the argument given, the two boldfaced portions play which of the following roles?',ch:['The first identifies the content of the conclusion of the argument; the second provides support for that conclusion.','The first provides support for the conclusion of the argument; the second identifies the content of that conclusion.','The first states the conclusion of the argument; the second calls that conclusion into question.','The first provides support for the conclusion of the argument; the second calls that conclusion into question.','Each provides support for the conclusion of the argument.'],ans:1,exp:'First bold: a PREMISE (background fact about switching to electric). Second bold: identifies the CONTENT of the conclusion (the answer is \'yes, FOR A GIVEN LEVEL OF OUTPUT\'). The condition is what specifies the conclusion\'s scope. Official answer B.'},'OG-779':{num:779,src:'OG',diff:'H',type:'Analysis',p:'A product that represents a clear technological advance over competing products can generally command a high price. Because technological advances tend to be quickly surpassed and companies want to make large profits while they still can, many companies charge the greatest price the market will bear when they have such a product. But large profits on the new product will give competitors a strong incentive to quickly match the new product’s capabilities. Consequently, the strategy to maximize overall profit from a new product is to charge less than the greatest possible price.',q:'In the argument above, the two portions in boldface play which of the following roles?',ch:['The first is an assumption that forms the basis for a course of action that the argument criticizes; the second presents the course of action endorsed by the argument./2024, 22:25','The first is a consideration raised to explain the appeal of a certain strategy; the second is a consideration raised to call into question the wisdom of adopting that strategy.','The first is an assumption that has been used to justify a certain strategy; the second is a consideration that is used to cast doubt on that assumption.','The first is a consideration raised in support of a strategy the argument endorses; the second presents grounds in support of that consideration.','The first is a consideration raised to show that adopting a certain strategy is unlikely to achieve the intended effect; the second is presented to explain the appeal of that strategy.'],ans:1,exp:'First bold: explains the APPEAL and RATIONALE for the charge-maximum strategy. Second bold: the CONCLUSION that contradicts it — \'the strategy is to charge LESS\' — questioning the strategy\'s wisdom. Official answer B.'},'VR-141':{num:141,src:'VR',diff:'E',type:'Mixed',p:'PhishCo runs a number of farms in the arid province of Nufa, depending largely on irrigation. Now, as part of a plan to efficiently increase the farms’ total production, it plans to drill down to an aquifer containing warm, slightly salty water that will be used to raise fish in ponds. The water from the ponds will later be used to supplement piped-in irrigation water for PhishCo’s vegetable fields, and the ponds and accompanying vegetation should help reduce the heat in the area of the farms.',q:'Which of the following would, if true, most strongly suggest that the plan, if implemented, would increase the overall efficiency of PhishCo’s farms?',ch:['Most of the vegetation to be placed around the ponds is native to Nufa./2024, 20:03','Fish raised on PhishCo’s farms are likely to be saleable in the nearest urban areas.','Organic waste from fish in the pond water will help to fertilize fields where it is used for irrigation.','The government of Nufa will help to arrange loan financing to partially cover the costs of drilling.','Ponds will be located on low-lying land now partially occupied by grain crops.'],ans:2,exp:'C: Organic waste from fish in pond water fertilizes fields where it is used for irrigation. Same water does double duty: fish food → fish waste fertilizes crops. More production for the SAME inputs = efficiency improvement.'},'VR-142':{num:142,src:'VR',diff:'E',type:'Weaken',p:'Stockholders have been critical of the Flyna Company, a major furniture retailer, because most of Flyna’s furniture is manufactured in Country X from local wood, and illegal logging is widespread there. However, Flyna has set up a certification scheme for lumber mills. It has hired a staff of auditors and forestry professionals who review documentation of the wood supply of Country X’s lumber mills to ensure its legal origin, make surprise visits to mills to verify documents, and certify mills as approved sources of legally obtained lumber. Flyna uses only lumber from certified mills. Thus, Flyna’s claim that its Country X wood supply is obtained legally is justified.',q:'Which of the following, if true, would most undermine the justification provided for Flyna’s claim?',ch:['Only about one-third of Flyna’s inspectors were hired from outside the company.','Country X’s government recently reduced its subsidies for lumber production.','Flyna has had to pay higher than expected salaries to attract qualified inspectors.','The proportion of Country X’s lumber mills inspected each year by Flyna’s staff is about 10 percent, randomly selected.','Illegal logging costs Country X’s government a significant amount in lost revenue each year.'],ans:3,exp:'D: Only 10% of mills are randomly selected per year. 90% of mills are NOT inspected each year. Some mills may go for many years without inspection, operating illegally while still certified. The certification scheme is far too sparse to ensure all lumber is legally obtained.'},'VR-143':{num:143,src:'VR',diff:'E',type:'Strengthen',p:'The XCT automobile is considered less valuable than the ZNK automobile, because insurance companies pay less, on average, to replace a stolen XCT than a stolen ZNK. Surprisingly, the average amount insurance companies will pay to repair a car involved in a collision is typically higher for the XCT than for the ZNK. One insurance expert explained that repairs to XCT automobiles are especially labor-intensive, and labor is a significant factor in collision repair costs.',q:'Which of the following, if true, most strongly supports the insurance expert’s explanation?',ch:['ZNK automobiles are involved in accidents more frequently than XCT automobiles.','The cost of routine maintenance for the ZNK is about the same as for the XCT.','There are more automobile mechanics who specialize in XCT repairs than in ZNK repairs.','The ease of repair of ZNK automobiles is one factor that adds to their value.','XCT automobiles are more likely to be stolen than ZNK automobiles.'],ans:3,exp:'D: ZNKs are more valuable BECAUSE they\'re easy (cheap) to repair — ease of repair adds to market value. XCTs are less valuable because they\'re expensive to repair. This directly explains the paradox: replacement cost (reflects market value) is lower for XCT, but repair cost (reflects labor intensity) is higher.'},'VR-145':{num:145,src:'VR',diff:'E',type:'Complete',p:'',q:'Which of the following, if true, most logically completes the argument below? Manufacturers are now required to make all cigarette lighters child-resistant by equipping them with safety levers. But this change is unlikely to result in a significant reduction in the number of fires caused by children playing with lighters, because children given the opportunity can figure out how to work the safety levers and __________.?',ch:['the addition of the safety levers has made lighters more expensive than they were before the requirement was instituted','adults are more likely to leave child-resistant lighters than non-child-resistant lighters in places that are accessible to children','many of the fires started by young children are quickly detected and extinguished by their parents','unlike child-resistant lighters, lighters that are not child-resistant can be operated by children as young as two years old','approximately 5,000 fires per year have been attributed to children playing with lighters before the safety levers were required'],ans:1,exp:'B: Adults become LESS CAREFUL about where they leave \'child-resistant\' lighters (false sense of security → more accessible). Combined with the first point (children CAN overcome levers), fires continue because: children can operate lighters AND have MORE ACCESS to them.'},'VR-146':{num:146,src:'VR',diff:'E',type:'Complete',p:'',q:'Which of the following most logically completes the passage? A business analysis of the Appenian railroad system divided its long-distance passenger routes into two categories: rural routes and interurban routes. The analysis found that, unlike the interurban routes, few rural routes carried a high enough passenger volume to be profitable. Closing unprofitable rural routes, however, will not necessarily enhance the profitability of the whole system, since __________.?',ch:['a large part of the passenger volume on interurban routes is accounted for by passengers who begin or end their journeys on rural routes','within the last two decades several of the least used rural routes have been closed and their passenger services have been replaced by buses','the rural routes were all originally constructed at least one hundred years ago, whereas some of the interurban routes were constructed recently for new high-speed express trains','not all of Appenia’s large cities are equally well served by interurban railroad services','the greatest passenger volume, relative to the routes’ capacity, is not on either category of long-distance routes but is on suburban commuter routes'],ans:0,exp:'A: Many interurban route passengers START or END journeys on rural routes. Closing rural routes removes these feeder passengers from profitable interurban routes. Cutting \'loss-makers\' simultaneously damages \'profit-makers.\''},'VR-147':{num:147,src:'VR',diff:'E',type:'Strengthen',p:'In its search for new technologies for solar energy that can produce lower-cost electricity, Smith-Diatom is developing a new way to make dye-sensitive solar cells, in which photons strike light-sensitive dyes. The process uses diatoms, which are unicellular algae that have silicon shells with a complex structure. First, the organic material is removed, and then the shells are coated with a titanium dioxide film that acts as a semiconductor. The diatoms’ structure results in more photon activity and thus more efficient production of electricity than with current dye-sensitized solar cells, which in turn lowers the cost./2024, 20:03',q:'Which of the following considerations would, if true, most strongly support the hypothesis that the plan, if implemented, will produce low-cost electricity from dye-sensitive solar cells?',ch:['Diatoms are an important link in oceanic food chains and help cycle carbon dioxide from the atmosphere.','The current cost of electricity produced by dye-sensitive solar cells is roughly three times that of non-solar electricity.','Because diatoms occur naturally, no special engineering processes are needed to produce the basic dye-sensitive solar cell structures.','Dye-sensitive solar cells work somewhat more efficiently in lower light than previous solar cell technologies.','The production of dye-sensitive solar cells primarily uses materials that do not harm the environment.'],ans:2,exp:'A: Can SPK004 actually GROW in this region? A confirms it can flourish in the same conditions as current varieties. Without this, the entire plan fails because the new variety requires different growing conditions. A is the crucial practical feasibility check.'},'VR-148':{num:148,src:'VR',diff:'E',type:'Strengthen',p:'Although Ackerburg’s subway system is currently operating at a deficit, the transit authority will lower subway fares next year. The authority projects that the lower fares will result in a ten percent increase in the number of subway riders. Since the additional income from the larger ridership will more than offset the decrease due to lower fares, the transit authority actually expects the fare reduction to reduce or eliminate the subway system’s operating deficit for next year.',q:'Which of the following, if true, provides the most support for the transit authority’s expectation of reducing the subway system’s operating deficit?',ch:['Throughout the years that the subway system has operated, fares have never before been reduced.','The planned fare reduction will not apply to students, who can already ride the subway for a reduced fare.','Next year, the transit authority will have to undertake several large-scale track maintenance projects.','The subway system can accommodate a ten percent increase in ridership without increasing the number of trains it runs each day.','The current subway fares in Ackerburg are higher than subway fares in other cities in the region.'],ans:3,exp:'C: Negate — \'Engine cleaning DOES remove planes from service.\' Then monthly cleaning grounds planes 12 times per year vs. biannual overhauls. The operational benefit (avoiding long-duration overhauls) disappears if cleaning also grounds planes.'},'VR-149':{num:149,src:'VR',diff:'E',type:'Mixed',p:'At several locations on the northwest coast of North America are formations known as chevrons—wedge-shaped formations of mounded sediment—pointing toward the ocean. Most geologists take them to have been formed by erosion, but recently other scientists have proposed that they were thrown up from the ocean by massive waves triggered by meteor impacts in the Pacific Ocean.',q:'Which of the following, if discovered, would most help in deciding which hypothesis is correct?',ch:['Chevron-like structures which are not currently near glaciers, large rivers, or other bodies of water','The presence, in chevrons, of deposits of ocean microfossils containing metals typically formed by meteor impacts','Oral-history evidence for flooding that could have been caused by ocean waves','The fact that exact data about the location and depth of any meteor impact craters on the Pacific seabed is lacking/2024, 20:03','The fact that certain changes in the shape and location of maritime sand dunes have been produced by the action of wind and waves'],ans:1,exp:'Official answer: B. See Official Guide explanation for full analysis.'},'VR-151':{num:151,src:'VR',diff:'E',type:'Mixed',p:'Patrick usually provides child care for six children. Parents leave their children at Patrick’s house in the morning and pick them up after work. At the end of each workweek, the parents pay Patrick at an hourly rate for the child care provided that week. The weekly income Patrick receives is usually adequate but not always uniform, particularly in the winter, when children are likely to get sick and be unpredictably absent.',q:'Which of the following plans, if put into effect, has the best prospect of making Patrick’s weekly income both uniform and adequate?',ch:['Pool resources with a neighbor who provides child care under similar arrangements, so that the two of them cooperate in caring for twice as many children as Patrick currently does.','Replace payment by actual hours of child care provided with a fixed weekly fee based upon the number of hours of child care that Patrick would typically be expected to provide.','Hire a full-time helper and invest in facilities for providing child care to sick children.','Increase the hourly rate to a level that would provide adequate income even in a week when half of the children Patrick usually cares for are absent.','Increase the number of hours made available for child care each day, so that parents can leave their children in Patrick’s care for a longer period each day at the current hourly rate.'],ans:1,exp:'Official answer: B. See Official Guide explanation for full analysis.'},'VR-152':{num:152,src:'VR',diff:'E',type:'Mixed',p:'Editorial: Consumers in North America think that by drinking frozen concentrated orange juice, they are saving energy, because it takes fewer truckloads to transport it than it takes to transport an equivalent amount of not-from-concentrate juice. But they are mistaken, for the amount of energy required to concentrate the juice is far greater than the energy difference in the juices’ transport.',q:'Which of the following, if true, would provide the greatest additional support for the editorial’s conclusion?',ch:['Freezer trucks use substantially more energy per mile driven than do any other types of trucks./2024, 20:03','Frozen juice can be stored for several years, while not-from-concentrate juice lasts a much shorter time.','Oranges grown in Brazil make up an increasing percentage of the fruit used in not-fromconcentrate juice production.','A serving of not-from-concentrate juice takes up to six times more space than a serving of frozen concentrated juice.','Though frozen concentrated juice must be kept at a lower temperature, not-fromconcentrate juice is far more sensitive to small temperature fluctuations.'],ans:0,exp:'Official answer: A. See Official Guide explanation for full analysis.'},'VR-153':{num:153,src:'VR',diff:'E',type:'Inference',p:'A computer equipped with signature-recognition software, which restricts access to a computer to those people whose signatures are on file, identifies a person’s signature by analyzing not only the form of the signature but also such characteristics as pen pressure and signing speed. Even the most adept forgers cannot duplicate all of the characteristics the program analyzes.',q:'Which of the following can be logically concluded from the passage above?',ch:['The time it takes to record and analyze a signature makes the software impractical for everyday use.','Computers equipped with the software will soon be installed in most banks.','Nobody can gain access to a computer equipped with the software solely by virtue of skill at forging signatures.','Signature-recognition software has taken many years to develop and perfect.','In many cases even authorized users are denied legitimate access to computers equipped with the software.'],ans:2,exp:'Official answer: C. See Official Guide explanation for full analysis.'},'VR-154':{num:154,src:'VR',diff:'E',type:'Explain',p:'The rate at which a road wears depends on various factors, including climate, amount of traffic, and the size and weight of the vehicles using it. The only land transportation to Rittland’s seaport is via a divided highway, one side carrying traffic to the seaport and one carrying traffic away from it. The side leading to the seaport has worn faster, even though each side has carried virtually the same amount of traffic, consisting mainly of large trucks.',q:'Which of the following, if true, most helps to explain the difference in the rate of wear?',ch:['The volume of traffic to and from Rittland’s seaport has increased beyond the intended capacity of the highway that serves it.','Wear on the highway that serves Rittland’s seaport is considerably greater during the cold winter months.','Wear on the side of the highway that leads to Rittland’s seaport has encouraged people to take buses to the seaport rather than driving there in their own automobiles.','A greater tonnage of goods is exported from Rittland’s seaport than is imported through it.','All of Rittland’s automobiles are imported by ship.'],ans:3,exp:'Official answer: D. See Official Guide explanation for full analysis.'},'VR-155':{num:155,src:'VR',diff:'E',type:'Assumption',p:'Ythex has developed a small diesel engine that produces 30 percent less particulate pollution than the engine made by its main rival, Onez, now widely used in Marania; Ythex’s engine is well-suited for use in the thriving warehousing businesses in Marania, though it costs more than the Onez engine. The Maranian government plans to ban within the next two years the use of diesel engines with more than 80 percent of current diesel engine particulate emissions in Marania, and Onez will probably not be able to retool its engine to reduce emissions to/2024, 20:03 reach this target. So if the ban is passed, the Ythex engine ought to sell well in Marania after that time.',q:'Which of the following is an assumption on which the argument above depends?',ch:['Marania’s warehousing and transshipment business buys more diesel engines of any size than other types of engines.','Ythex is likely to be able to reduce the cost of its small diesel engine within the next two years.','The Maranian government is generally favorable to anti-pollution regulations.','The government’s ban on high levels of pollution caused by diesel engines, if passed, will not be difficult to enforce.','The other manufacturers of small diesel engines in Marania, if there are any, have not produced an engine as popular and clean running as Ythex’s new engine.'],ans:4,exp:'Negate E: \'Other manufacturers HAVE produced engines as clean as Ythex\'s.\' Then when Onez fails to comply, customers could switch to THOSE competitors — not necessarily Ythex. The argument requires Ythex to have no equally clean competitors.'},'VR-156':{num:156,src:'VR',diff:'E',type:'Strengthen',p:'In parts of South America, vitamin-A deficiency is a serious health problem, especially among children. In one region, agriculturists are attempting to improve nutrition by encouraging farmers to plant a new variety of sweet potato called SPK004 that is rich in beta-carotene, which the body converts into vitamin A. The plan has good chances of success, since sweet potato is a staple of the region’s diet and agriculture, and the varieties currently grown contain little beta-carotene.',q:'Which of the following, if true, most strongly supports the prediction that the plan will succeed?',ch:['The growing conditions required by the varieties of sweet potato currently cultivated in the region are conditions in which SPK004 can flourish.','The flesh of SPK004 differs from that of the currently cultivated sweet potatoes in color and texture, so traditional foods would look somewhat different when prepared from SPK004.','There are no other varieties of sweet potato that are significantly richer in beta-carotene than SPK004 is.','The varieties of sweet potato currently cultivated in the region contain some important nutrients that are lacking in SPK004.','There are other vegetables currently grown in the region that contain more betacarotene than the currently cultivated varieties of sweet potato do.'],ans:0,exp:'A: Can SPK004 actually grow in this region? A confirms it can flourish in the same local growing conditions — removing the most critical practical obstacle to adoption.'},'VR-157':{num:157,src:'VR',diff:'E',type:'Complete',p:'',q:'Which of the following most logically completes the argument? The last members of a now-extinct species of a European wild deer called the giant deer lived in Ireland about 16,000 years ago. Prehistoric cave paintings in France depict this animal as having a large hump on its back. Fossils of this animal, however, do not show any hump. Nevertheless, there is no reason to conclude that the cave paintings are therefore inaccurate in this regard, since __________.?',ch:['some prehistoric cave paintings in France also depict other animals as having a hump','fossils of the giant deer are much more common in Ireland than in France','animal humps are composed of fatty tissue, which does not fossilize','the cave paintings of the giant deer were painted well before 16,000 years ago','only one currently existing species of deer has any anatomical feature that even remotely resembles a hump/2024, 20:03'],ans:2,exp:'C: BONE fossilizes, but humps are FATTY TISSUE which does NOT fossilize. Fossil absence doesn\'t mean the hump didn\'t exist — soft tissue doesn\'t preserve. The paintings accurately depict a feature the fossil record cannot show.'},'VR-159':{num:159,src:'VR',diff:'E',type:'Weaken',p:'Cocoa grown organically on trees within the shade of the rain forest canopy commands a premium price. However, acquiring and maintaining the certification that allows the crop to be sold as organically grown is very time-consuming and laborious. Meanwhile, the price premium for the grower is about 30 percent, whereas cocoa trees grown in full sun using standard techniques can have twice the yield of organic, shade-grown trees. Financially, therefore, standard techniques are the better choice for the farmer.',q:'Which of the following, if true, most seriously weakens the argument?',ch:['Cocoa can be grown only in a climate that has the temperature and moisture characteristics of a tropical rain forest.','Cocoa trees grown using standard techniques require costly applications of fertilizer and pesticides, unlike shade-grown trees.','Although organically grown cocoa has long commanded a price premium over cocoa grown using standard techniques, its price has fluctuated considerably during that period.','Cocoa is not the only cash crop that can be raised on plots that leave the rain forest canopy overhead essentially intact.','Governments and international conservation organizations are working to streamline organic certification so as to relieve farmers of unnecessary work.'],ans:1,exp:'B: Organic (shade-grown) trees need NO costly pesticides or fertilizers. If those inputs account for significant costs in sun-grown farming, the net profitability difference may be much smaller than the yield difference suggests — possibly favoring organic farming.'},'VR-160':{num:160,src:'VR',diff:'E',type:'Strengthen',p:'Psychologists conducted an experiment in which half of the volunteers were asked to describe an unethical action they had performed, while the other half were asked to describe an ethical action they had performed. Some of the volunteers, chosen at random from each of the two groups, were encouraged to wash their hands afterward. Among those who described unethical actions, those who washed their hands were significantly less likely to volunteer for another, similar experiment than those who did not wash their hands. The researchers concluded that some of the subjects failed to volunteer again in part because of their having described an unethical action.',q:'Which of the following would, if true, most help to support the researchers’ conclusion?/2024, 20:03?',ch:['Among the volunteers who described ethical actions, those who washed their hands were significantly less likely to volunteer for another, similar experiment than those who did not wash their hands.','The average likelihood of volunteering for another, similar experiment was higher among those who described ethical actions than among those who described unethical actions.','Most of the volunteers who were encouraged to wash their hands did so.','The volunteers in the study were not more disposed to washing their hands under normal circumstances than the general population was.','Equal numbers of volunteers from both groups were encouraged to wash their hands.'],ans:1,exp:'Official answer: B. See Official Guide explanation for full analysis.'},'VR-161':{num:161,src:'VR',diff:'E',type:'Mixed',p:'High levels of fertilizer and pesticides, needed when farmers try to produce high yields of the same crop year after year, pollute water sup
