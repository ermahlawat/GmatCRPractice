eater than many marine biologists had, until recently, believed.','The presence of large quantities of the virus in seawater does not adversely affect the growth of marine plants.','The amount of the virus naturally present in seawater in which brown tides occur is neither significantly greater nor significantly less than the amount present in seawater in which brown tides do not occur.'],ans:3,exp:'D confirms: the virus doesn\'t harm marine plants. The plan — kill algae → plants survive → shellfish survive — doesn\'t create collateral damage to the very ecosystem it\'s trying to save.'},'OG-673':{num:673,src:'OG',diff:'E',type:'Weaken',p:'In the last few years, plant scientists have been able to genetically engineer seeds to produce crops highly resistant to insect damage. Farmers growing crops with these seeds will be able to spend significantly less on pesticides. This cost reduction would more than make up for the higher cost of the genetically engineered seeds. Clearly, therefore, farmers who grow crops from genetically engineered seeds will be able to reduce their costs by using them.',q:'Which of the following, if true, most weakens the argument?',ch:['Plant scientists have not yet developed insect-resistant strains of every crop that is currently grown commercially.','The cost of several commonly used pesticides is expected to rise in the next few years.','Crops grown from the genetically engineered seeds require significantly more fertilizer and water to grow well than do crops grown from nonengineered seeds.','In the future, the cost of genetically engineered seeds is likely to fall to the level of nonengineered seeds.','The crops that now require the greatest expenditure on pesticides are not the ones for which genetically engineered seeds will become available.'],ans:2,exp:'C introduces hidden costs: GMO crops need significantly more fertilizer AND water. Even if pesticide savings are real, if fertilizer + water costs exceed those savings, total costs don\'t decrease. The argument ignores these inputs.'},'OG-674':{num:674,src:'OG',diff:'E',type:'Mixed',p:'Educational theorist: Recent editorials have called for limits on the amount of homework assigned to schoolchildren younger than 12. They point out that free-time activities play an important role in childhood development and that homework in large quantities can severely restrict children’s free time, hindering their development. But the actual average homework time for children under 12—little more than 30 minutes per night—leaves plenty of free time. In reality, therefore, the editorials’ rationale cannot justify the restriction they advocate.',q:'Which of the following, if true, would most seriously call into question the educational theorist’s conclusion?',ch:['Some teachers give as homework assignments work of a kind that research suggests is most effective educationally when done in class.','For children younger than 12, regularly doing homework in the first years of school has no proven academic value, but many educators believe that it fosters self-discipline and time management.','Some homework assignments are related to free-time activities that children engage in, such as reading or hobbies.','A substantial proportion of schoolchildren under 12, particularly those in their first few years of school, have less than 10 minutes of homework assigned per night./2024, 22:25','Some free-time activities teach children skills or information that they later find useful in their schoolwork.'],ans:3,exp:'D undermines the \'30 minutes average\' claim: if a substantial proportion have less than 10 minutes, another substantial proportion must have MORE than 30 minutes. The editorials\' concern about excessive homework may be valid for that heavily-burdened group.'},'OG-676':{num:676,src:'OG',diff:'E',type:'Mixed',p:'The tulu, a popular ornamental plant, does not reproduce naturally and is only bred and sold by specialized horticultural companies. Unfortunately, the tulu is easily devastated by a contagious fungal rot. The government ministry plans to reassure worried gardeners by requiring all tulu plants to be tested for fungal rot before being sold. However, infected plants less than 30 weeks old have generally not built up enough fungal rot in their systems to be detected reliably. And many tulu plants are sold before they are 24 weeks old.',q:'Which of the following, if performed by the government ministry, could logically be expected to overcome the problem with their plan to test for the fungal rot?',ch:['Releasing a general announcement that tulu plants less than 30 weeks old cannot be effectively tested for fungal rot','Requiring all tulu plants less than 30 weeks old to be labeled as such','Researching possible ways to test tulu plants less than 24 weeks old for fungal rot','Ensuring that tulu plants are not sold before they are 30 weeks old','Quarantining all tulu plants from horticultural companies at which any case of fungal rot has been detected until those tulu plants can be tested for fungal rot'],ans:3,exp:'D solves the problem: no tulu plant sold before 30 weeks → ALL plants can be reliably tested. By ensuring no plant is sold too young, the testing program can actually work for every plant sold.'},'OG-677':{num:677,src:'OG',diff:'E',type:'Explain',p:'While many people think of genetic manipulation of food crops as being aimed at developing larger and larger plant varieties, some plant breeders have in fact concentrated on discovering or producing dwarf varieties, which are roughly half as tall as normal varieties.',q:'Which of the following would, if true, most help to explain the strategy of the plant breeders referred to above?',ch:['Plant varieties used as food by some are used as ornamentals by others.','The wholesale prices of a given crop decrease as the supply of it increases./2024, 22:25','Crops once produced exclusively for human consumption are often now used for animal feed.','Short plants are less vulnerable to strong wind and heavy rains.','Nations with large industrial sectors tend to consume more processed grains.'],ans:3,exp:'D explains the strategy: shorter plants are MORE RESISTANT to wind and heavy rain. A reliably-surviving dwarf plant may produce more total yield over its lifetime than a taller plant that gets flattened by storms.'},'OG-678':{num:678,src:'OG',diff:'E',type:'Mixed',p:'Secret passwords are often used to control access to computers. When employees select their own passwords, they frequently choose such easily guessed passwords as their initials or birth dates. To improve security, employers should assign randomly generated passwords to employees rather than allowing employees to make up their own.',q:'Which of the following, if true, most seriously undermines the conclusion drawn above?',ch:['If passwords are generated randomly, it is theoretically possible that employees will be assigned passwords that they might have selected on their own.','Randomly generated passwords are so difficult for employees to recall that they often record the passwords in places where the passwords could be easily seen by others.','Computer systems protected by passwords are designed to ignore commands that are entered by employees or others who use invalid passwords.','In general, the higher the level of security maintained at the computer system, the more difficult it is for unauthorized users to obtain access to the system.','Control of physical access to computers by the use of locked doors and guards should be used in addition to passwords in order to maintain security.'],ans:1,exp:'B reveals the unintended consequence: random passwords are too complex to memorize → employees write them down in accessible places → anyone can see them. Written passwords are LESS secure than guessable-but-remembered ones.'},'OG-679':{num:679,src:'OG',diff:'E',type:'Weaken',p:'The economy around Lake Paqua depends on fishing of the lake’s landlocked salmon population. In recent years, scarcity of food for salmon there has caused a decline in both the number and the size of the adult salmon in the lake. As a result, the region’s revenues from salmon fishing have declined significantly. To remedy this situation, officials plan to introduce shrimp, which can serve as a food source for adult salmon, into Lake Paqua.',q:'Which of the following, if true, most seriously calls into question the plan’s chances for success?',ch:['Salmon is not a popular food among residents of the Lake Paqua region.','Tourists coming to fish for sport generate more income for residents of the Lake Paqua region than does commercial fishing.','The shrimp to be introduced into Lake Paqua are of a variety that is too small to be harvested for human consumption.','The primary food for both shrimp and juvenile salmon is plankton, which is not abundant in Lake Paqua.','Fishing regulations prohibit people from keeping any salmon they have caught in Lake Paqua that are smaller than a certain minimum size. Questions 680–737 — Difficulty: Medium'],ans:3,exp:'D is devastating: shrimp AND juvenile salmon BOTH compete for the same food (plankton), which is ALREADY scarce. Introducing shrimp could harm juvenile salmon, making the overall population WORSE.'},'OG-680':{num:680,src:'OG',diff:'M',type:'Weaken',p:'Airline representative: The percentage of flight delays caused by airline error decreased significantly this year. This indicates that airlines listened to complaints about preventable errors and addressed the problems. Although delays caused by weather and other uncontrollable factors will always be part of travel, preventable delays are clearly decreasing.',q:'Which of the following most clearly points to a logical flaw in the representative’s reasoning?/2024, 22:25?',ch:['Airlines may be motivated by financial concerns to underreport the percentage of flight delays caused by airline error.','The delays caused by uncontrollable factors could have led to an increase in complaints to airlines.','Complaints may not be the most reliable measure of how many errors occurred in a given year.','Delays caused by weather and other uncontrollable factors could have increased dramatically during the year under discussion.','Airline customers might not believe that particular delays were caused by uncontrollable factors rather than airline error.'],ans:3,exp:'FLAW — Percentage vs. Absolute Numbers: D exposes this. If weather delays increased dramatically, total delays surge. Even if the same absolute number of airline-error delays occurred, their PERCENTAGE would fall. Falling percentage ≠ actual improvement.'},'OG-681':{num:681,src:'OG',diff:'M',type:'Assumption',p:'Although the school would receive financial benefits if it had soft drink vending machines in the cafeteria, we should not allow them. Allowing soft drink machines there would not be in our students’ interest. If our students start drinking more soft drinks, they will be less healthy.',q:'The argument depends on which of the following?',ch:['If the soft drink vending machines were placed in the cafeteria, students would consume more soft drinks as a result.','The amount of soft drinks that most students at the school currently drink is not detrimental to their health.','Students are apt to be healthier if they do not drink soft drinks at all than if they just drink small amounts occasionally.','Students will not simply bring soft drinks from home if the soft drink vending machines are not placed in the cafeteria.','The school’s primary concern should be to promote good health among its students.'],ans:0,exp:'Negate A: \'Machines would NOT lead to more consumption.\' The health argument vanishes — no extra consumption, no health harm. A is the critical first link in the causal chain.'},'OG-682':{num:682,src:'OG',diff:'M',type:'Strengthen',p:'Many athletes inhale pure oxygen after exercise in an attempt to increase muscular reabsorption of oxygen. Measured continuously after exercise, however, the blood lactate levels of athletes who inhale pure oxygen are practically identical, on average, to those of athletes who breathe normal air. The lower the blood lactate level is, the higher the muscular reabsorption of oxygen is.',q:'If the statements above are all true, they most strongly support which of the following conclusions?',ch:['Athletes’ muscular reabsorption of oxygen is not increased when they inhale pure oxygen instead of normal air.','High blood lactate levels cannot be reduced.','Blood lactate levels are a poor measure of oxygen reabsorption by muscles.','The amount of oxygen reabsorbed by an athlete’s muscles always remains constant.','The inhaling of pure oxygen has no legitimate role in athletics.'],ans:0,exp:'Combine: (1) Pure O₂ = same blood lactate as normal air. (2) Lower lactate = higher reabsorption. Therefore: same lactate = same reabsorption = NO INCREASE in reabsorption. Answer A states this exactly.'},'OG-683':{num:683,src:'OG',diff:'M',type:'Strengthen',p:'Historian: Fifteenth-century advances in mapmaking contributed to the rise of modern nationstates. In medieval Europe (from the fifth to the fifteenth century), sovereignty centered in cities and towns and radiated outward, with boundaries often ambiguously defined. The conceptual shift toward the modern state began in the late fifteenth century, when mapmakers learned to reflect geography accurately by basing maps on latitude-longitude grids. By the mid-seventeenth century, nearly all maps showed boundary lines.',q:'Which of the following would, if true, most strengthen the historian’s reasoning?/2024, 22:25?',ch:['Borders did not become codified in Europe until certain treaties were signed in the early nineteenth century.','During the medieval period, various authorities in Europe claimed power over collections of cities and towns, not contiguous territories.','Many members of the political elite collected maps as a hobby during the late sixteenth and early seventeenth centuries.','Seventeenth-century treatises and other sources of political authority describe areas of sovereignty rather than illustrate them using maps.','During the fifteenth century in Europe, mapmakers simplified the borders of sovereignty by drawing clear lines of demarcation between political powers.'],ans:4,exp:'E: Mapmakers in the 15th century were ALREADY drawing clear political boundary lines. Maps were actively CREATING the visual concept of clear borders — maps led, politics followed. A (borders codified in 19th century — weakens), D (written sources — weakens maps\' influence).'},'OG-684':{num:684,src:'OG',diff:'M',type:'Complete',p:'Sascha: The attempt to ban parliament’s right to pass directed-spending bills—bills that contain provisions specifically funding the favorite projects of some powerful politicians—is antidemocratic. Our nation’s constitution requires that money be drawn from our treasury only when so stipulated by laws passed by parliament, the branch of government most directly representative of the citizens. This requirement is based on the belief that exercising the power to spend public resources involves the ultimate exercise of state authority and that therefore _________.',q:'Which of the following most logically completes Sascha’s argument?',ch:['designating funding specifically for the favorite projects of some powerful politicians should be considered antidemocratic','the right to exercise such a power should belong exclusively to the branch of government most directly representative of the citizens','exercising the power to spend public resources is in most cases—but not all—protected by the constitution','modifications to any spending bills should be considered expenditures authorized by law','only officials who are motivated by concerns for reelection should retain that power'],ans:1,exp:'B most logically completes: spending power = ultimate state authority + should belong to the most representative branch. Therefore: \'the right to exercise such power should belong exclusively to the branch most representative of citizens.\' Answer B.'},'OG-685':{num:685,src:'OG',diff:'M',type:'Analysis',p:'Boreal owls range over a much larger area than do other owls of similar size. Scientists have hypothesized that it is scarcity of prey that leads the owls to range so widely. This hypothesis would be hard to confirm directly, since it is not possible to produce a sufficiently accurate count of the populations of small mammals inhabiting the forests where boreal owls live. Careful study of owl behavior has, however, shown that boreal owls do range over larger areas when they live in regions where food of the sort eaten by small mammals is comparatively sparse. This indicates that the scientists’ hypothesis is not sheer speculation.',q:'In the argument given, the two boldfaced portions play which of the following roles?',ch:['The first presents an explanatory hypothesis; the second states the main conclusion of the argument.','The first presents an explanatory hypothesis; the second presents evidence tending to support this hypothesis.','The first presents an explanatory hypothesis; the second presents evidence to support an alternative explanation.','The first describes a position that the argument opposes; the second presents evidence to undermine the support for the position being opposed.','The first describes a position that the argument opposes; the second states the main conclusion of the argument./2024, 22:25'],ans:1,exp:'First bold: discusses the hypothesis and its direct confirmation limitation. Second bold: \'This INDICATES the hypothesis is not sheer speculation\' — this IS the main CONCLUSION drawn from indirect evidence. Official answer B: first = hypothesis, second = main conclusion.'},'OG-687':{num:687,src:'OG',diff:'M',type:'Analysis',p:'Last year a record number of new manufacturing jobs were created. Will this year bring another record? Well, any new manufacturing job is created either within an existing company or by the start-up of a new company. Within existing firms, new jobs have been created this year at well below last year’s record pace. At the same time, there is considerable evidence that the number of new companies starting up will be no higher this year than it was last year, and there is no reason to think that the new companies starting up this year will create more jobs per company than did last year’s start-ups. So clearly, the number of new jobs created this year will fall short of last year’s record.',q:'In the argument given, the two portions in boldface play which of the following roles?',ch:['The first is a claim that the argument challenges; the second is an explicit assumption on which that challenge is based.','The first is a claim that the argument challenges; the second is a judgment advanced in support of the main conclusion of the argument.','The first provides evidence in support of the main conclusion of the argument; the second is an objection that has been raised against that main conclusion.','The first provides evidence in support of the main conclusion of the argument; the second is a judgment advanced in support of that main conclusion.','The first and the second are each claims that have been advanced in support of a position that the argument opposes.'],ans:3,exp:'First bold: the benchmark (last year\'s record) = EVIDENCE providing context for the conclusion that this year will fall short. Second bold: judgment supporting the main conclusion by closing off the second job creation pathway. Official answer D.'},'OG-688':{num:688,src:'OG',diff:'M',type:'Explain',p:'A study of ticket sales at a summer theater festival found that people who bought tickets to individual plays had a no-show rate of less than 1 percent, while those who paid in advance for all ten plays being performed that summer had a no-show rate of nearly 30 percent. This may be at least in part because the greater the awareness customers retain about the cost of an item, the more likely they are to use it.',q:'Which of the following would, if true, best serve as an alternative explanation of the results of the study?/2024, 22:25?',ch:['The price per ticket was slightly cheaper for those who bought all ten tickets in advance.','Many people who attended the theater festival believed strongly that they should support it financially.','Those who attended all ten plays became eligible for a partial refund.','Usually, people who bought tickets to individual plays did so immediately prior to each performance that they attended.','People who arrived just before the performance began could not be assured of obtaining seats in a preferred location.'],ans:3,exp:'D provides an alternative explanation: individual buyers purchase RIGHT BEFORE the show (they\'re already going). Season pass holders bought months ago — life changed. Low no-show rate = purchase TIMING, not cost awareness.'},'OG-689':{num:689,src:'OG',diff:'M',type:'Assumption',p:'Although there is no record of poet Edmund Spenser’s parentage, we do know that as a youth, Spenser attended the Merchant Tailors’ School in London for a period between 1560 and 1570. Records from this time indicate that the Merchant Tailors’ Guild then had only three members named Spenser: Robert Spenser, listed as a gentleman; Nicholas Spenser, elected the Guild’s Warden in 1568; and John Spenser, listed as a “journeyman cloth-maker.” Of these, the last was likely the least affluent of the three—and most likely Edmund’s father, since school accounting records list Edmund as a scholar who attended the school at a reduced fee.',q:'Which of the following is an assumption on which the argument depends?',ch:['Anybody in sixteenth-century London who made clothing professionally would have had to be a member of the Merchant Tailors’ Guild.','The fact that Edmund Spenser attended the Merchant Tailors’ School did not necessarily mean that he planned to become a tailor.','No member of the Guild could become Guild warden in sixteenth-century London unless he was a gentleman.','Most of those whose fathers were members of the Merchant Tailors’ Guild were students at the Merchant Tailors’ School.','The Merchant Tailors’ School did not reduce its fees for the children of the more affluent Guild members.'],ans:4,exp:'Negate E: \'The school DID reduce fees for affluent Guild members\' children too.\' Then Edmund\'s reduced fee tells us nothing about family wealth — any of the three Spensers could be his father. E is essential: only poor children got fee reductions.'},'OG-691':{num:691,src:'OG',diff:'M',type:'Explain',p:'Rainwater contains hydrogen of a heavy form called deuterium. The deuterium content of wood reflects the deuterium content of rainwater available to trees during their growth. Wood from trees that grew between 16,000 and 24,000 years ago in North America contains significantly more deuterium than wood from trees growing today. But water trapped in several North American caves that formed during that same early period contains significantly less deuterium than rainwater in North America contains today.',q:'Which of the following, if true, most helps to reconcile the two findings?',ch:['There is little deuterium in the North American caves other than the deuterium in the water trapped there.','Exposure to water after a tree has died does not change the deuterium content of the wood.','Industrialization in North America over the past 100 years has altered the deuterium content of rain.','Trees draw on shallow groundwater from rain that falls during their growth, whereas water trapped in caves may have fallen as rainwater thousands of years before the caves formed.','Wood with a high deuterium content is no more likely to remain preserved for long periods than is wood with a low deuterium content.'],ans:3,exp:'D resolves: trees draw on RECENT rainwater. Cave water may have fallen as rain THOUSANDS OF YEARS BEFORE the caves formed — from a different era when deuterium levels were different. Different time periods explain the apparent contradiction.'},'OG-692':{num:692,src:'OG',diff:'M',type:'Weaken',p:'Enforcement of local speed limits through police monitoring has proven unsuccessful in the town of Ardane. In many nearby towns, speed humps (raised areas of pavement placed across residential streets, about 300 feet apart) have reduced traffic speeds on residential streets by 20 to 25 percent. In order to reduce traffic speed and thereby enhance safety in residential neighborhoods, Ardane’s transportation commission plans to install multiple speed humps in those neighborhoods.',q:'Which of the following, if true, identifies a potentially serious drawback to the plan for installing speed humps in Ardane?',ch:['On residential streets without speed humps, many vehicles travel at speeds more than 25 percent above the posted speed limit.','Because of their high weight, emergency vehicles such as fire trucks and ambulances must slow almost to a stop at speed humps.','The residential speed limit in Ardane is higher than that of the nearby towns where speed humps were installed.','Motorists who are not familiar with the streets in Ardane’s residential districts would be likely to encounter the speed humps unawares unless warned by signs and painted indicators.','Bicyclists generally prefer that speed humps be constructed so as to leave a space on the side of the road where bicycles can travel without going over the humps.'],ans:1,exp:'B: EMERGENCY VEHICLES must nearly stop at each hump. Delayed emergency response directly endangers lives — defeating the SAFETY goal while achieving the SPEED goal. Plans that succeed at their mini-goal but defeat their overall purpose.'},'OG-694':{num:694,src:'OG',diff:'M',type:'Mixed',p:'Archaeologist: Researchers excavating a burial site in Cyprus found a feline skeleton lying near a human skeleton. Both skeletons were in the same sediment at the same depth and equally well-preserved, suggesting that the feline and human were buried together about 9,500 years ago. This shows that felines were domesticated around the time farming began, when they would have been useful in protecting stores of grain from mice.',q:'Which of the following, if true, would most seriously weaken the archaeologist’s argument?',ch:['Archaeologists have not found any remains of stores of grain in the immediate vicinity of the burial site.','The burial site in Cyprus is substantially older than any other known burial site in which a feline skeleton and a human skeleton appear to have been buried together.','Paintings found near the burial site seem to show people keeping felines as domestic companions but do not show felines hunting mice.','In Cyprus, there are many burial sites dating from around 9,500 years ago in which the remains of wild animals appear to have been buried alongside human remains.','Before felines were domesticated, early farmers had no effective way to protect stores of grain from mice.'],ans:3,exp:'D: Wild animals were commonly buried with humans at that time in Cyprus. If wild animals regularly ended up in human burials, co-burial doesn\'t prove domestication. The feline could be wild.'},'OG-695':{num:695,src:'OG',diff:'M',type:'Mixed',p:'Farmer: Several people in the past few years have claimed to have seen a mountain lion in the suburban outskirts—the latest just last month—and, while mountain lions were thought to have been driven from this entire region about twenty years ago, there is no reason for the people who reported seeing a mountain lion to have deliberately concocted a false report. Therefore, local wildlife managers should begin to urgently address the mountain lion’s presence.',q:'Which of the following would, if true, most seriously weaken the farmer’s argument?',ch:['Farmers in the suburban outskirts mostly raise cattle and hogs, which when fully grown are generally not attacked by mountain lions.','Mountain lions are dissimilar in size and color to other wild animals found near the suburban outskirts.','No person who claimed to have seen a mountain lion had anyone else with them at the purported sighting.','There have been no regional reports in the past year of mountain lions migrating to the area.','Recent surveys show that more than half of the people in the region report that they have never seen a mountain lion before./2024, 22:25'],ans:2,exp:'C: Every sighting was by a SINGLE person with NO CORROBORATION. A sincere but mistaken person could easily misidentify another animal. The farmer ignores HONEST MISTAKES by assuming no lying = genuine sighting.'},'OG-696':{num:696,src:'OG',diff:'M',type:'Mixed',p:'The heavy traffic in Masana is a growing drain on the city’s economy—the clogging of the streets of the central business district alone cost the economy more than $1.2 billion over the past year. In order to address this problem, officials plan to introduce congestion pricing, by which drivers would pay to enter the city’s most heavily trafficked areas during the busiest times of the day.',q:'Which of the following, if true, would most strongly indicate that the plan will be a success?',ch:['Approximately one-fifth of the vehicles in the central business district are in transit from one side of the city to the other.','Planners expect that, without congestion pricing, traffic in Masana is likely to grow by 6 percent in the next five years.','In other urban areas, congestion pricing has strongly encouraged carpooling (sharing of rides by private commuters).','Several studies have shown that a reduction in traffic of 15 percent in Masana could result in 5,500 or more new jobs.','Over 30 percent of the vehicles in the city’s center are occupied by more than one person.'],ans:2,exp:'C: In OTHER urban areas, congestion pricing successfully encouraged carpooling — demonstrating the method achieves traffic reduction in comparable settings. Direct empirical evidence.'},'OG-697':{num:697,src:'OG',diff:'M',type:'Assumption',p:'Economist: The most economically efficient way to reduce emissions of air pollutants is to tax them in proportion to the damage they are likely to cause. But in Country Y, many serious pollutants are untaxed and unregulated, and policy makers strongly oppose new taxes. Therefore, the best way to achieve a reduction in air pollutant emissions in Country Y would be to institute fixed upper limits on them.',q:'Which of the following is an assumption of the economist’s argument?',ch:['Policy makers in Country Y oppose all new taxes equally strongly, regardless of any benefits they may provide.','Country Y’s air pollutant emissions would not fall significantly if they were taxed in proportion to the damage they are likely to cause.','Policy makers in Country Y strongly favor reductions in air pollutant emissions.','Country Y’s policy makers believe that air pollutant emissions should be reduced with maximum economic efficiency.','Policy makers in Country Y do not oppose setting fixed upper limits on air pollutant emissions as strongly as they oppose new taxes.'],ans:4,exp:'Negate E: \'Policy makers oppose fixed limits JUST AS STRONGLY as taxes.\' Then fixed limits are ALSO blocked — the economist has no viable alternative to offer. The recommendation requires limits to be politically more feasible than taxes.'},'OG-699':{num:699,src:'OG',diff:'M',type:'Strengthen',p:'Many industrialized nations are trying to reduce atmospheric concentrations of carbon dioxide, a gas released by the burning of fossil fuels. One proposal is to replace conventional cement, which is made with calcium carbonate, by a new “eco-cement.” This new cement, made with magnesium carbonate, absorbs large amounts of carbon dioxide when exposed to the atmosphere. Therefore, using eco-cement for new concrete building projects will significantly help reduce atmospheric concentrations of carbon dioxide.',q:'Which of the following, if true, most strengthens the argument?',ch:['The cost of magnesium carbonate, currently greater than the cost of calcium carbonate, probably will fall as more magnesium carbonate is used in cement manufacture.','Eco-cement is strengthened when absorbed carbon dioxide reacts with the cement.','Before the development of eco-cement, magnesium-based cement was considered too susceptible to water erosion to be of practical use.','The manufacture of eco-cement uses considerably less fossil fuel per unit of cement than the manufacture of conventional cement does.','Most building-industry groups are unaware of the development or availability of ecocement.'],ans:3,exp:'D addresses manufacturing: eco-cement uses LESS fossil fuel to make than conventional cement. Both in production (less CO₂ emitted) AND in use (CO₂ absorbed), eco-cement reduces atmospheric CO₂. Addresses the hidden \'manufacturing emissions\' concern.'},'OG-701':{num:701,src:'OG',diff:'M',type:'Strengthen',p:'Advertisement: When your car’s engine is running at its normal operating temperature, any major brand of motor oil will protect it about as well as Tuff does. When the engine is cold, it is a different story: Tuff motor oil flows better at lower temperatures than its major competitors do. So, if you want your car’s engine to have maximum protection, you should use Tuff.',q:'Which of the following, if true, most strengthens the argument in the advertisement?',ch:['Tuff motor oil provides above-average protection for engines that happen to overheat.','Tuff motor oil is periodically supplied free of charge to automobile manufacturers to use in factory-new cars./2024, 22:25','Tuff motor oil’s share of the engine oil market peaked three years ago.','Tuff motor oil, like any motor oil, is thicker and flows less freely at cold temperatures than at hot temperatures.','Tuff motor oil is manufactured at only one refinery and shipped from there to all markets.'],ans:0,exp:'Official answer: A. See Official Guide explanation for full analysis.'},'OG-703':{num:703,src:'OG',diff:'M',type:'Strengthen',p:'The Testament of William Thorpe was published around 1530 as an appendix to Thorpe’s longer Examination. Many scholars, however, doubt the attribution of the Testament to Thorpe because, whereas the Examination is dated 1406, the Testament is dated 1460. One scholar has recently argued that the 1460 date be amended to 1409, based on the observation that when these numbers are expressed as Roman numerals, MCCCCLX and MCCCCIX, it becomes easy to see how the dates might have become confused through scribal error.',q:'Which of the following, if true, would most support the scholar’s hypothesis concerning the date of the Testament?',ch:['The sole evidence that historians have had that William Thorpe died no earlier than 1460 was the presumed date of publication of the Testament.','In the preface to the 1530 publication, the editor attributes both works to William Thorpe.','Few writers in fifteenth-century England marked dates in their works using only Roman numerals.','The Testament alludes to a date, “Friday, September 20,” as apparently contemporaneous with the writing of the Testament, and September 20 fell on a Friday in 1409 but not in 1460.','The Testament contains few references to historical events that occurred later than 1406.'],ans:3,exp:'D provides independent calendrical confirmation: \'Friday, September 20\' in the Testament, and September 20 fell on a Friday in 1409 but NOT in 1460. An objective historical fact that confirms 1409 independently of the Roman numeral analysis.'},'OG-704':{num:704,src:'OG',diff:'M',type:'Analysis',p:'A prominent investor who holds a large stake in the Burton Tool Company has recently claimed that the company is mismanaged, citing as evidence the company’s failure to slow down production in response to a recent rise in its inventory of finished products. It is doubtful whether an investor’s sniping at management can ever be anything other than counterproductive, but in this case, it is clearly not justified. It is true that an increased/2024, 22:25 inventory of finished products often indicates that production is outstripping demand, but in Burton’s case it indicates no such thing. Rather, the increase in inventory is entirely attributable to products that have already been assigned to orders received from customers.',q:'In the argument given, the two boldfaced portions play which of the following roles?',ch:['The first states a generalization that underlies the position that the argument as a whole opposes; the second provides evidence to show that the generalization does not apply in the case at issue.','The first states a generalization that underlies the position that the argument as a whole opposes; the second clarifies the meaning of a specific phrase as it is used in that generalization.','The first provides evidence to support the conclusion of the argument as a whole; the second is evidence that has been used to support the position that the argument as a whole opposes.','The first provides evidence to support the conclusion of the argument as a whole; the second states that conclusion.','The first and the second each provide evidence against the position that the argument as a whole opposes.'],ans:0,exp:'Official answer: A. See Official Guide explanation for full analysis.'},'OG-705':{num:705,src:'OG',diff:'M',type:'Explain',p:'To reduce productivity losses from employees calling in sick, Corporation X implemented a new policy requiring employees to come into work unless they were so sick that they had to go to a doctor. But a year after the policy was implemented, a study found that Corporation X’s overall productivity losses due to reported employee illnesses had increased.',q:'Which of the following, if true, would best explain why the policy produced the reverse of its intended effect?',ch:['After the policy was implemented, employees more frequently went to the doctor when they felt sick.','Before the policy was implemented, employees who were not sick at all often called in sick.','Employees coming into work when sick often infect many of their coworkers.','Unusually few employees became genuinely sick during the year after the policy was implemented.','There are many other factors besides employee illness that can adversely affect productivity.'],ans:2,exp:'C: Sick employees who COME TO WORK infect many colleagues. One person sick at home → one productivity loss. One sick person at work → multiple people eventually sick → multiple productivity losses. The policy multiplied the problem.'},'OG-706':{num:706,src:'OG',diff:'M',type:'Strengthen',p:'Advertising by mail has become much less effective, with fewer consumers responding. Because consumers are increasingly overwhelmed by the sheer amount of junk mail they receive, most discard almost all offers without considering them. Thus, an effective way for corporations to improve response rates would be to more carefully target the individuals to whom they mail advertising, thereby cutting down on the amount of junk mail each consumer receives.',q:'Which of the following, if true, would most support the recommendation above?',ch:['There are cost-effective means by which corporations that currently advertise by mail could improve response rates.','Many successful corporations are already carefully targeting the individuals to whom they mail advertising./2024, 22:25','Any consumer who, immediately after receiving an advertisement by mail, merely glances at it, is very likely to discard it.','Improvements in the quality of the advertising materials used in mail that is carefully targeted to individuals can improve the response rate for such mail.','Response rates to carefully targeted advertisements by mail are considerably higher, on average, than response rates to most other forms of advertising.'],ans:4,exp:'E: Targeted mail already achieves HIGHER response rates than most other advertising forms. Direct evidence that targeted mailing already works — supporting the recommendation to adopt it more widely.'},'OG-707':{num:707,src:'OG',diff:'M',type:'Mixed',p:'Petrochemical industry officials have said that the extreme pressure exerted on plant managers during the last five years to improve profits by cutting costs has done nothing to impair the industry’s ability to operate safely. However, environmentalists contend that the recent rash of serious oil spills and accidents at petrochemical plants is traceable to costcutting measures.',q:'Which of the following, if true, would provide the strongest support for the position held by industry officials?',ch:['The petrochemical industry benefits if accidents do not occur, since accidents involve risk of employee injury as well as loss of equipment and product.','Petrochemical industry unions recently demanded that additional money be spent on safety and environmental protection measures, but the unions readily abandoned those demands in exchange for job security.','Despite major cutbacks in most other areas of operation, the petrochemical industry has devoted more of its resources to environmental and safety measures in the last five years than in the preceding five years.','There is evidence that the most damaging of the recent oil spills would have been prevented had cost-cutting measures not been instituted.','Both the large fines and the adverse publicity generated by the most recent oil spill have prompted the petrochemical industry to increase the resources devoted to oil-spill prevention.'],ans:2,exp:'C: Despite major cutbacks elsewhere, the petrochemical industry actually INCREASED resources devoted to environmental and safety measures. If safety spending rose while other costs fell, safety was not impaired by cost-cutting.'},'OG-708':{num:708,src:'OG',diff:'M',type:'Strengthen',p:'A company has developed a new sensing device that, according to the company’s claims, detects weak, ultralow-frequency electromagnetic signals associated with a beating heart. These signals, which pass through almost any physical obstruction, are purportedly detected by the device even at significant distances. Therefore, if the company’s claims are true, their device will radically improve emergency teams’ ability to locate quickly people who are trapped within the wreckage of collapsed buildings.',q:'Which of the following, if true, most strengthens the argument?',ch:['People trapped within the wreckage of collapsed buildings usually have serious injuries that require prompt medical treatment.','The device gives a distinctive reading when the signals it detects come from human beings rather than from any other living beings.','Most people who have survived after being trapped in collapsed buildings were rescued within two hours of the building’s collapse.','Ultralow-frequency signals are not the only electromagnetic signals that can pass through almost any physical obstruction.','Extensive training is required in order to operate the device effectively.'],ans:1,exp:'B: The device gives a DISTINCTIVE reading specifically for human beings, not other living beings. Without this, the device might detect animal heartbeats, creating false leads. B confirms it accurately identifies humans specifically.'},'OG-709':{num:709,src:'OG',diff:'M',type:'Analysis',p:'Economist: The price of tap water in our region should be raised drastically. Supplies in local freshwater reservoirs have been declining for years because water is being used faster than/2024, 22:25 it can be replenished. Since the price of tap water has been low, few users have bothered to adopt even easy conservation measures.',q:'The two sections in boldface play which of the following roles in the economist’s argument?',ch:['The first is a conclusion for which support is provided, and which in turn supports the main conclusion; the second is the main conclusion.','The first is an observation for which the second provides an explanation; the second is the main conclusion but not the only conclusion.','The first is a premise supporting the argument’s main conclusion; so is the second.','The first is the only conclusion; the second provides an explanation for the first.','The first is the main conclusion; the second is a conclusion for which support is provided, and which in turn supports the first.'],ans:2,exp:'Both boldface sections function as PREMISES supporting the main conclusion. First bold = the policy recommendation (raise prices). Second bold = the premise explaining why current low prices are the problem. Official answer C.'},'OG-710':{num:710,src:'OG',diff:'M',type:'Mixed',p:'Politician: Hybrid cars use significantly less fuel per kilometer than nonhybrids. And fuel produces air pollution, which contributes to a number of environmental problems. Motorists can save money by driving cars that are more fuel efficient, and they will be encouraged to drive hybrid cars if we make them aware of that fact. Therefore, we can help reduce the total amount of pollution emitted by cars in this country by highlighting this advantage of hybrid cars.',q:'Which of the following, if true, would most indicate a vulnerability of the politician’s argument?',ch:['People with more fuel-efficient cars typically drive more than do those with less fuelefficient cars.','Not all air pollution originates from automobiles.','Hybrid cars have already begun to gain popularity.','Fuel-efficient alternatives to hybrid cars will likely become available in the future.','The future cost of gasoline and other fuel cannot be predicted with absolute precision or certainty.'],ans:0,exp:'A identifies the \'rebound effect\': people with fuel-efficient cars typically DRIVE MORE. If extra miles offset per-mile savings, total pollution could stay the same or INCREASE. Less fuel per km × many more km = same or more total pollution.'},'OG-711':{num:711,src:'OG',diff:'M',type:'Mixed',p:'Mayor: False alarms from home security systems waste so much valuable police time that in many communities, police have stopped responding to alarms from homes whose systems frequently produce false alarms. This policy reduces wastage of police time but results in a loss of protection for some residents. To achieve a comparable reduction in wastage without reducing protection for residents, the council has enacted a measure to fine residents for repeated false alarms.',q:'Which of the following, if true, casts the most doubt on whether the measure enacted by the council will achieve its goal?',ch:['A fine in the amount planned by the council will not cover the expenses police typically incur when they respond to a false alarm.','Homes equipped with security systems are far less likely to be broken into than are homes without security systems.','The threat of fines is likely to cause many residents to deactivate their security systems.','The number of home security systems is likely to increase dramatically over the next five years.','Many home security systems have never produced false alarms./2024, 22:25'],ans:2,exp:'C: Fines → people DEACTIVATE security systems. No system = no false alarms (waste reduced ✓) but also no real alarms (protection lost ✗). The measure achieves waste reduction but creates exactly the protection loss it was designed to avoid.'},'OG-712':{num:712,src:'OG',diff:'M',type:'Mixed',p:'Excavation of the house of a third-century Camarnian official revealed that he had served four magistrates—public officials who administer the law—over his thirty-year public career, in four provincial capital cities. However, given the Camarnian administrative system of that era, it is unclear whether he served them simultaneously, as a traveling administrator living for part of the year in each provincial capital, or else did so sequentially, leaving one magistrate after several years to join another.',q:'Which of the following would, if found in the excavation, most likely help reveal the pattern of the official’s administrative service?',ch:['Maps and documents describing each of the four provincial capitals','A cache of the official’s documents related to work from early in his career','A set of cups of a type made only in the city of the first magistrate whom the official is known to have served','Several pieces of furniture in the styles of two of the provincial capital cities','Heavy clothing appropriate only for the coldest of the four cities'],ans:1,exp:'Official answer: B. See Official Guide explanation for full analysis.'},'OG-713':{num:713,src:'OG',diff:'M',type:'Assumption',p:'In 1563, in Florence’s Palazzo Vecchio, Giorgio Vasari built in front of an existing wall a new wall on which he painted a mural. Investigators recently discovered a gap between Vasari’s wall and the original, large enough to have preserved anything painted on the original. Historians believe that Leonardo da Vinci had painted, but left unfinished, a mural on the original wall; some historians had also believed that by 1563, the mural had been destroyed. However, it is known that in the late 1560s, when renovating another building, Santa Maria Novella, Vasari built a façade over its frescoes, and the frescoes were thereby preserved. Thus, Leonardo’s Palazzo Vecchio mural probably still exists behind Vasari’s wall.',q:'Which of the following is an assumption on which the argument depends?',ch:['Leonardo rarely if ever destroyed artworks that he left unfinished.','Vasari was likely unaware that the mural in the Palazzo Vecchio had willingly been abandoned by Leonardo.','Vasari probably would not have built the Palazzo Vecchio wall with a gap behind it except to preserve something behind the new wall.','Leonardo would probably have completed the Palazzo Vecchio mural if he had had the opportunity to do so.','When Vasari preserved the frescoes of Santa Maria Novella he did so secretly.'],ans:2,exp:'Negate C: \'Vasari might have built the gap for structural or OTHER non-preservation reasons.\' Then the gap tells us nothing about intent to preserve. The argument requires the gap to be INTENTIONAL and FOR PRESERVATION.'},'OG-714':{num:714,src:'OG',diff:'M',type:'Mixed',p:'Coffee shop owner: A large number of customers will pay at least the fair market value for a cup of coffee, even if there is no formal charge. Some will pay more than this out of appreciation of the trust that is placed in them. And our total number of customers is likely to increase. We could therefore improve our net cash flow by implementing an honor system in which customers pay what they wish for coffee by depositing money in a can. Manager: We’re likely to lose money on this plan. Many customers would cheat the system, paying a very small sum or nothing at all.',q:'Which of the following, if true, would best support the owner’s plan, in light of the manager’s concern?',ch:['The new system, if implemented, would increase the number of customers.','By roasting its own coffee, the shop has managed to reduce the difficulties (and cost) of maintaining an inventory of freshly roasted coffee./2024, 22:25','Many customers stay in the cafe for long stretches of time.','The shop makes a substantial profit from pastries and other food bought by the coffee drinkers.','No other coffee shop in the area has such a system.'],ans:3,exp:'Official answer: D. See Official Guide explanation for full analysis.'},'OG-715':{num:715,src:'OG',diff:'M',type:'Assumption',p:'Birds have been said to be descended from certain birdlike dinosaur species with which they share distinctive structural features. The fossil record, however, shows that this cannot be so, since there are bird fossils that are much older than the earliest birdlike dinosaur fossils that have been found.',q:'Which of the following is an assumption on which the argument relies?',ch:['The birdlike dinosaurs have no living descendants.','There are no flightless dinosaur species that have the distinctive structural features shared by birds and birdlike dinosaurs.','There are no birdlike dinosaur fossils that are older than the bird fossils but have not yet been unearthed.','It could not have been the case that some birds were descended from one of the birdlike dinosaur species and other birds from another.','Birds cannot have been descended from dinosaur species with which the birds do not share the distinctive structural features.'],ans:2,exp:'Negate C: \'There ARE older birdlike dinosaur fossils not yet unearthed.\' If they exist undiscovered, birdlike dinosaurs might actually predate the bird fossils we\'ve found — and birds COULD descend from them. The argument depends on the fossil record being complete.'},'OG-717':{num:717,src:'OG',diff:'M',type:'Strengthen',p:'Certain groups of Asian snails include both “left-handed” and “right-handed” species, with shells coiling to the left and right, respectively. Some left-handed species have evolved from right-handed ones. Also, researchers found that snail-eating snakes in the same habitat have asymmetrical jaws, allowing them to grasp right-handed snail shells more easily. If these snakes ate more right-handed snails over time, this would have given left-handed snails an evolutionary advantage over right-handed snails, with the left-handed snails eventually becoming a new species. Thus, the snakes’ asymmetrical jaws probably helped drive the emergence of the left-handed snail species.',q:'Which of the following would, if true, most strengthen the argument that asymmetrical snake jaws helped drive left-handed snail evolution?/2024, 22:25?',ch:['In one snake species, the snakes with asymmetrical jaws eat snails, while the snakes with symmetrical jaws do not eat snails.','Some species of Asian snails contain either all right-handed snails or all left-handed snails.','Anatomical differences prevent left-handed snails from mating easily with right-handed snails.','Some right-handed snails in this habitat have shells with a very narrow opening that helps prevent snakes from extracting the snails from inside their shells.','Experiments show that the snail-eating snakes in this habitat fail more often in trying to eat left-handed snails than in trying to eat right-handed snails.'],ans:4,exp:'E directly confirms the key mechanism: snakes fail MORE OFTEN trying to eat left-handed snails than right-handed ones. This confirms the asymmetry creates a real selective predation difference, providing the survival advantage that would drive evolution.'},'OG-718':{num:718,src:'OG',diff:'M',type:'Strengthen',p:'A moderately large city is redesigning its central downtown area and is considering a plan that would reduce the number of lanes for automobiles and trucks and increase those for bicycles and pedestrians. The intent is to attract more workers and shoppers to downtown businesses by making downtown easier to reach and more pleasant to move around in.',q:'Which of the following would, if true, most strongly support the prediction that the plan would achieve its goal?',ch:['People who make a habit of walking or bicycling whenever feasible derive significant health benefits from doing so.','Most people who prefer to shop at suburban malls instead of downtown urban areas do so because parking is easier and cheaper at the former.','In other moderately sized cities where measures were taken to make downtowns more accessible for walkers and cyclists, downtown businesses began to thrive.','If the proposed lane restrictions on drivers are rigorously enforced, more people will likely be attracted to downtown businesses than would otherwise be.','Most people who own and frequently ride bicycles for recreational purposes live at a significant distance from downtown urban areas.'],ans:2,exp:'C: In other moderately sized cities, making downtowns more accessible for walkers and cyclists led to thriving downtown businesses. Direct empirical evidence from comparable contexts.'},'OG-719':{num:719,src:'OG',diff:'M',type:'Strengthen',p:'Previously, Autoco designed all of its cars itself and then contracted with specialized parts suppliers to build parts according to its specifications. Now it plans to include its suppliers in designing the parts they are to build. Since many parts suppliers have more designers with specialized experience than Autoco has, Autoco expects this shift to reduce the overall time and cost of the design of its next new car.',q:'Which of the following, if true, most strongly supports Autoco’s expectation?',ch:['When suppliers provide their own designs, Autoco often needs to modify its overall design.','In order to provide designs for Autoco, several of the parts suppliers will have to add to their existing staffs of designers.','Parts and services provided by outside suppliers account for more than 50 percent of Autoco’s total costs.','When suppliers built parts according to specifications provided by Autoco, the suppliers competed to win contracts.','Most of Autoco’s suppliers have on hand a wide range of previously prepared parts designs that can readily be modified for a new car./2024, 22:25'],ans:4,exp:'E: Suppliers already HAVE relevant designs ready that can be modified for a new car. They don\'t start from scratch. This dramatically reduces design time and cost — the key efficiency claim.'},'OG-720':{num:720,src:'OG',diff:'M',type:'Mixed',p:'In response to viral infection, the immune systems of mice typically produce antibodies that destroy the virus by binding to proteins on its surface. Mice infected with the herpesvirus generally develop keratitis, a degenerative disease affecting part of the eye. Since proteins on the surface of cells in this part of the eye closely resemble those on the herpesvirus surface, scientists hypothesize that these cases of keratitis are caused by antibodies to the herpesvirus.',q:'Which of the following, if true, most helps to support the scientists’ reasoning?',ch:['Other types of viruses have surface proteins that closely resemble proteins found in various organs of mice.','Mice that are infected with the herpesvirus but do not develop keratitis produce as many antibodies as infected mice that do develop keratitis.','Mice infected with a new strain of the herpesvirus that has different surface proteins did not develop keratitis.','Mice that have never been infected with the herpesvirus can sometimes develop keratitis.','There are mice that are unable to form antibodies in response to herpes infections, and these mice contract herpes at roughly the same rate as other mice.'],ans:2,exp:'C: A new herpesvirus strain with DIFFERENT surface proteins did NOT cause keratitis. When protein similarity is removed, keratitis doesn\'t occur. Confirms that surface protein similarity IS the causal mechanism.'},'OG-721':{num:721,src:'OG',diff:'M',type:'Mixed',p:'One might expect that within a particular species, any individuals that managed to slow down the aging process would leave more offspring. Natural selection should therefore favor extreme longevity—but this does not seem to be the case. A possible explanation is that aging is a product of the inevitable wear and tear of living, similar to how household appliances generally accumulate faults that lead to their eventual demise. However, most researchers do not find this analogy satisfactory as an explanation.',q:'Which of the following would, if true, provide the strongest explanation for the researchers’ reaction?',ch:['Some organisms are capable of living much longer than other organisms.','Some organisms reproduce very quickly despite having short lifespans.','There are several ways of defining “extreme longevity,” and according to some definitions it occurs frequently.','Organisms are capable of maintenance and self-repair and can remedy much of the damage that they accumulate.','Some organisms generate much more wear and tear on their bodies than others.'],ans:3,exp:'D: Unlike appliances, organisms can REPAIR THEMSELVES. Appliances accumulate damage passively. But organisms have immune systems, repair mechanisms, and regeneration. The self-repair capability makes the appliance analogy invalid as a model for biological aging.'},'OG-722':{num:722,src:'OG',diff:'M',type:'Analysis',p:'Last year a record number of new manufacturing jobs were created. Will this year bring another record? Well, any new manufacturing job is created either within an existing company or by the start-up of a new company. Within existing firms, new jobs have been created this year at well below last year’s record pace. At the same time, there is considerable evidence that the number of new companies starting up this year will be no higher than it was last year, and there is no reason to think that the new companies starting up this year will create more jobs per company than did last year’s start-ups. So clearly, the number of new jobs created this year will fall short of last year’s record.',q:'In the argument given, the two portions in boldface play which of the following roles?',ch:['The first provides evidence in support of the main conclusion of the argument; the second is a claim that the argument challenges.','The first is a generalization that the argument seeks to establish; the second is a conclusion that the argument draws in order to support that generalization./2024, 22:25','The first is a generalization that the argument seeks to establish; the second is a judgment that has been advanced in order to challenge that generalization.','The first is presented as an obvious truth on which the argument is based; the second is a claim that has been advanced in support of a position that the argument opposes.','The first is presented as an obvious truth on which the argument is based; the second is a judgment advanced in support of the main conclusion of the argument.'],ans:4,exp:'Official answer E: first is presented as obvious truth on which argument is based, second is judgment supporting the main conclusion.'},'OG-723':{num:723,src:'OG',diff:'M',type:'Analysis',p:'Last year a record number of new manufacturing jobs were created. Will this year bring another record? Well, any new manufacturing job is created either within an existing company or by the start-up of a new company. Within existing firms, new jobs have been created this year at well below last year’s record pace. At the same time, there is considerable evidence that the number of new companies starting up will be no higher this year than it was last year, and there is no reason to think that the new companies starting up this year will create more jobs per company than did last year’s start-ups. So clearly, the number of new jobs created this year will fall short of last year’s record.',q:'In the argument given, the two portions in boldface play which of the following roles?',ch:['The first is presented as an obvious truth on which the argument is based; the second is the main conclusion of the argument.','The first is presented as an obvious truth on which the argument is based; the second is a conclusion drawn in order to support the main conclusion of the argument.','The first and the second each provide evidence in support of the main conclusion of the argument.','The first is a generalization that the argument seeks to establish; the second is the main conclusion of the argument.','The first is a generalization that the argument seeks to establish; the second is a conclusion that has been drawn in order to challenge that generalization.'],ans:0,exp:'Official answer A: first is presented as obvious truth on which argument is based, second is the main conclusion of the argument.'},'OG-724':{num:724,src:'OG',diff:'M',type:'Strengthen',p:'In Stenland, many workers have been complaining that they cannot survive on minimum wage, the lowest wage an employer is permitted to pay. The government is proposing to raise the minimum wage. Many employers who pay their workers the current minimum wage argue that if it is raised, unemployment will increase because they will no longer be able to afford to employ as many workers.',q:'Which of the following, if true in Stenland, most strongly supports the claim that raising the minimum wage there will not have the effects that the employers predict?',ch:['For any position with wages below a living wage, the difficulty of finding and retaining employees adds as much to employment costs as would raising wages.','Raising the minimum wage does not also increase the amount employers have to contribute in employee benefits.','When inflation is taken into account, the proposed new minimum wage is not as high as the current one was when it was introduced.','Many employees currently being paid wages at the level of the proposed new minimum wage will demand significant wage increases.','Many employers who pay some workers only the minimum wage also pay other workers wages that are much higher than the minimum.'],ans:0,exp:'A: For below-living-wage positions, difficulty of FINDING AND RETAINING employees already adds costs equivalent to what a wage increase would cost. Raising wages reduces turnover, keeping total employment costs the same. No reason to cut staff.'},'OG-725':{num:725,src:'OG',diff:'M',type:'Complete',p:'Biologists with a predilection for theory have tried—and largely failed—to define what it is that makes something a living thing. Organisms take in energy-providing materials and excrete/2024, 22:25 waste products, but so do automobiles. Living things replicate and take part in evolution, but so do some computer programs. We must be open to the possibility that there are living things on other planets. Therefore, we will not be successful in defining what it is that makes something a living thing merely by examining living things on Earth—the only ones we know. Trying to do so is analogous to trying to specify __________.',q:'Which of the following most logically completes the passage?',ch:['the laws of physics by using pure mathematics','what a fish is by listing its chemical components','what an animal is by examining a plant','what a machine is by examining a sketch of it','what a mammal is by examining a zebra'],ans:4,exp:'Official answer: E. See Official Guide explanation for full analysis.'},'OG-726':{num:726,src:'OG',diff:'M',type:'Mixed',p:'For the period from the eighth century through the eleventh century, the shifting boundaries between Kingdom F and Kingdom G have not been well charted. Although a certain village in a border region between the two kingdoms usually belonged to Kingdom G, ninth-century artifacts found in the village were in the typical Kingdom F style of that time. It is unclear whether the village was actually a part of Kingdom F in the ninth century or whether it was a part of Kingdom G but had merely adopted Kingdom F’s artistic styles under Kingdom F’s cultural influence.',q:'Which of the following would, if found in ninth-century sites in the village, best help in determining whether the village was a part of Kingdom F or Kingdom G in the ninth century?',ch:['A trading contract written in the Kingdom G dialect','A drawing of a dwelling complex known to have existed on the border of Kingdom F and Kingdom G in the ninth century','Knives and other utensils made from metal typical of ninth-century mining sites in Kingdom F','Some fragments of pottery made in the Kingdom G style from the seventh century out of materials only found in Kingdom F','Numerous teeth from the ninth century with a chemical signature typical only of teeth from people who had grown up in the heart of Kingdom F'],ans:4,exp:'Official answer: E. See Official Guide explanation for full analysis.'},'OG-727':{num:727,src:'OG',diff:'M',type:'Mixed',p:'Sammy: For my arthritis, I am going to try my aunt’s diet: large amounts of wheat germ and garlic. She was able to move more easily right after she started that diet. Pat: When my brother began that diet, his arthritis got worse. But he has been doing much better since he stopped eating vegetables in the nightshade family, such as tomatoes and peppers.',q:'Which of the following, if true, would provide a basis for explaining the fact that Sammy’s aunt and Pat’s brother had contrasting experiences with the same diet?',ch:['A change in diet, regardless of the nature of the change, frequently brings temporary relief from arthritis symptoms.','The compounds in garlic that can lessen the symptoms of arthritis are also present in tomatoes and peppers.','Arthritis is a chronic condition whose symptoms improve and worsen from time to time without regard to diet./2024, 22:25','In general, men are more likely to have their arthritis symptoms alleviated by avoiding vegetables in the nightshade family than are women.','People who are closely related are more likely to experience the same result from adopting a particular diet than are people who are unrelated.'],ans:2,exp:'C: Arthritis is a chronic condition whose symptoms improve and worsen from time to time WITHOUT REGARD to diet. Both experiences (aunt improved, brother worsened) could be unrelated to the diet entirely — just natural fluctuation in symptoms. This explains both contrasting experiences.'},'OG-728':{num:728,src:'OG',diff:'M',type:'Weaken',p:'In the 1960s, surveys of Florida’s alligator population indicated that the population was dwindling rapidly. Hunting alligators was banned. By the early 1990s, the alligator population had recovered, and restricted hunting was allowed. Over the course of the 1990s, reports of alligators appearing on golf courses and lawns increased dramatically. Therefore, in spite of whatever alligator hunting went on, the alligator population must have increased significantly over the decade of the 1990s.',q:'Which of the following, if true, most seriously weakens the argument?',ch:['The human population of Florida increased significantly during the 1990s.','The hunting restrictions applied to commercial as well as private hunters.','The number of sightings of alligators in lakes and swamps increased greatly in Florida during the 1990s.','Throughout the 1990s, selling alligator products was more strictly regulated than hunting was.','Most of the sightings of alligators on golf courses and lawns in the 1990s occurred at times at which few people were present on those golf courses and lawns.'],ans:0,exp:'A: Florida\'s HUMAN POPULATION increased significantly. More people near alligator habitats → more encounters → more sightings reported. The alligator population could be stable while sightings increase because more humans are present to observe them.'},'OG-729':{num:729,src:'OG',diff:'M',type:'Assumption',p:'Infotek, a computer manufacturer in Katrovia, has just introduced a new personal computer model that sells for significantly less than any other model. Market research shows, however, that very few Katrovian households without personal computers would buy a computer, regardless of its price. Therefore, introducing the new model is unlikely to increase the number of computers in Katrovian homes.',q:'Which of the following is an assumption on which the argument depends?',ch:['Infotek achieved the lower price of the new model by using components of lower quality than those used by other manufacturers.','The main reason cited by consumers in Katrovia for replacing a personal computer is the desire to have an improved model.','Katrovians in households that already have computers are unlikely to purchase the new Infotek model as an additional computer for home use.','The price of other personal computers in Katrovia is unlikely to drop below the price of Infotek’s new model in the near future.','Most personal computers purchased in Katrovia are intended for home use.'],ans:2,exp:'Negate C: \'Existing-computer households WILL buy the new model as an additional computer.\' Then computers in homes INCREASES even without attracting new adopters. The conclusion that numbers won\'t increase fails.'},'OG-730':{num:730,src:'OG',diff:'M',type:'Weaken',p:'Fast-food restaurants make up 45 percent of all restaurants in Canatria. Customers at these restaurants tend to be young; in fact, studies have shown that the older people get, the less likely they are to eat in fast-food restaurants. Since the average age of the Canatrian population is gradually rising and will continue to do so, the number of fast-food restaurants is likely to decrease.',q:'Which of the following, if true, most seriously weakens the argument?',ch:['Fast-food restaurants in Canatria are getting bigger, so each one can serve more customers./2024, 22:25','Some older people eat at fast-food restaurants more frequently than the average young person.','Many people who rarely eat in fast-food restaurants nevertheless eat regularly in restaurants.','The overall population of Canatria is growing steadily.','As the population of Canatria gets older, more people are eating at home.'],ans:3,exp:'D: Overall POPULATION is growing. Even if the PROPORTION of young people falls, the total NUMBER of young people might stay the same or increase. More total people = more total young people = more fast-food customers.'},'OG-731':{num:731,src:'OG',diff:'M',type:'Weaken',p:'Last year a chain of fast-food restaurants, whose menu had always centered on hamburgers, added its first vegetarian sandwich, much lower in fat than the chain’s other offerings. Despite heavy marketing, the new sandwich accounts for a very small proportion of the chain’s sales. The sandwich’s sales would have to quadruple to cover the costs associated with including it on the menu. Since such an increase is unlikely, the chain would be more profitable if it dropped the sandwich.',q:'Which of the following, if true, most seriously weakens the argument?',ch:['Although many of the chain’s customers have never tried the vegetarian sandwich, in a market research survey, most of those who had tried it reported that they were very satisfied with it.','Many of the people who eat at the chain’s restaurants also eat at the restaurants of competing chains and report no strong preference among the competitors.','Among fast-food chains in general, there has been little or no growth in hamburger sales over the past several years as the range of competing offerings at other restaurants has grown.','When even one member of a group of diners is a vegetarian or has a preference for lowfat food, the group tends to avoid restaurants that lack vegetarian or low-fat menu options.','An attempt by the chain to introduce a lower-fat hamburger failed several years ago, since it attracted few new customers and most of the chain’s regular customers greatly preferred the taste of the regular hamburgers.'],ans:3,exp:'D: When even ONE member of a group is vegetarian, the ENTIRE GROUP avoids restaurants without vegetarian options. The vegetarian sandwich doesn\'t need to be a top seller — it enables groups with vegetarian members to choose the restaurant at all.'},'OG-732':{num:732,src:'OG',diff:'M',type:'Inference',p:'Transportation expenses accounted for a large portion of the total dollar amount spent on trips for pleasure by residents of the United States in 1997, and about half of the total dollar amount spent on transportation was for airfare. However, the large majority of United States residents who took trips for pleasure in 1997 did not travel by airplane but used other means of transportation.',q:'If the statements above are true, which of the following must also be true about United States residents who took trips for pleasure in 1997?',ch:['Most of those who traveled by airplane did so because the airfare to their destination was lower than the cost of other available means of transportation.','Most of those who traveled by airplane did so because other means of transportation to their destination were unavailable.','Per mile traveled, those who traveled by airplane tended to spend more on transportation to their destination than did those who used other means of transportation.','Overall, people who did not travel by airplane had lower average transportation expenses than people who did./2024, 22:25','Those who traveled by airplane spent about as much, on average, on other means of transportation as they did on airfare.'],ans:3,exp:'Official answer: D. See Official Guide explanation for full analysis.'},'OG-733':{num:733,src:'OG',diff:'M',type:'Mixed',p:'Voters commonly condemn politicians for being insincere, but politicians often must disguise their true feelings when they make public statements. If they expressed their honest views— about, say, their party’s policies—then achieving politically necessary compromises would be much more difficult. Clearly, the very insincerity that people decry shows that our government is functioning well.',q:'Which of the following, if true, most seriously undermines this reasoning?',ch:['Achieving political compromises is not all that is necessary for the proper functioning of a government.','Some political compromises are not in the best long-term interest of the government.','Voters often judge politicians by criteria other than the sincerity with which they express their views.','A political party’s policies could turn out to be detrimental to the functioning of a government.','Some of the public statements made by politicians about their party’s policies could in fact be sincere.'],ans:0,exp:'A: \'Achieving politically necessary compromises is not ALL that is necessary for a functioning government.\' The insincerity might enable compromises while undermining other essential elements (accountability, trust, effective policy).'},'OG-734':{num:734,src:'OG',diff:'M',type:'Strengthen',p:'One summer, floods covered low-lying garlic fields situated in a region with a large mosquito population. Since mosquitoes lay their eggs in standing water, flooded fields would normally attract mosquitoes, yet no mosquitoes were found in the fields. Diallyl sulfide, a major component of garlic, is known to repel several species of insects, including mosquitoes, so it is likely that diallyl sulfide from the garlic repelled the mosquitoes.',q:'Which of the following, if true, most strengthens the argument?',ch:['Diallyl sulfide is also found in onions but at concentrations lower than in garlic.','The mosquito population of the region as a whole was significantly smaller during the year in which the flooding took place than it had been in previous years.','By the end of the summer, most of the garlic plants in the flooded fields had been killed by waterborne fungi.','Many insect species not repelled by diallyl sulfide were found in the flooded garlic fields throughout the summer.','Mosquitoes are known to be susceptible to toxins in plants other than garlic, such as marigolds.'],ans:3,exp:'Official answer: D. See Official Guide explanation for full analysis.'},'OG-735':{num:735,src:'OG',diff:'M',type:'Mixed',p:'The population of desert tortoises in Targland’s Red Desert has declined, partly because they are captured for sale as pets and partly because people riding all-terrain vehicles have damaged their habitat. Targland plans to halt this population decline by blocking the current access routes into the desert and announcing new regulations to allow access only on foot. Targland’s officials predict that these measures will be adequate, since it is difficult to collect the tortoises without a vehicle.',q:'Which of the following would it be most important to establish in order to evaluate the officials’ prediction?',ch:['Whether possessing the tortoises as pets remains legally permissible in Targland','Whether Targland is able to enforce the regulations with respect to all-terrain vehicle entry at points other than the current access routes/2024, 22:25','Whether the Red Desert tortoises are most active during the day or at night','Whether people who travel on foot in the Red Desert often encounter the tortoises','Whether the Targland authorities held public hearings before restricting entry by vehicle into the Red
