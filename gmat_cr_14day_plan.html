<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Helvetica Neue",Arial,sans-serif;font-size:15px;line-height:1.65;background:#EEF0F5;color:#1A1A2E}
#tb{background:#003087;color:#fff;padding:10px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.3)}
#tb h1{font-size:14px;font-weight:600;letter-spacing:.2px;flex-shrink:0}
#pw{flex:1;background:rgba(255,255,255,.25);border-radius:3px;height:6px;min-width:60px;overflow:hidden}
#pb{background:#4CAF50;height:6px;border-radius:3px;transition:width .4s;width:0%}
#pt{font-size:12px;white-space:nowrap;opacity:.9}
#wt{background:#002060;display:flex;border-bottom:2px solid #001040}
.wbtn{padding:9px 20px;color:rgba(255,255,255,.65);font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.15s}
.wbtn.on{color:#fff;border-bottom-color:#4FC3F7}
.wbtn:hover:not(.on){color:#fff;background:rgba(255,255,255,.06)}
#dn{background:#F0F2F8;padding:10px 16px;display:flex;flex-wrap:wrap;gap:6px;border-bottom:1px solid #DDE}
.db{width:38px;height:38px;border-radius:6px;border:1.5px solid #CBD;background:#FFF;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;position:relative;color:#555}
.db:hover:not(.on){background:#E3EEFF;border-color:#90B4F7;color:#1A3CBA}
.db.on{background:#003087;color:#fff;border-color:#003087}
.db.dn{border-color:#388E3C;color:#2E7D32}
.db.dn::after{content:'✓';position:absolute;top:-5px;right:-5px;background:#388E3C;color:#fff;font-size:9px;border-radius:50%;width:13px;height:13px;display:flex;align-items:center;justify-content:center;line-height:13px}
.db.dn.on{background:#003087;color:#fff;border-color:#003087}
#mc{max-width:960px;margin:0 auto;padding:16px}
.dc{border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:20px}
.dh{background:#003087;color:#fff;padding:16px 20px}
.dh-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.dtag{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:600;background:rgba(255,255,255,.2);color:#fff}
.dtitle{font-size:19px;font-weight:600}
.dsub{font-size:13px;opacity:.85;margin-top:4px}
.th-wrap{background:#fff;border:1px solid #DDE;border-top:none}
.th-btn{width:100%;background:#EEF2FF;border:none;border-bottom:1px solid #DDE;padding:10px 20px;text-align:left;cursor:pointer;font-size:13px;font-weight:700;color:#003087;display:flex;justify-content:space-between;align-items:center}
.th-btn:hover{background:#E3EEFF}
.th-body{padding:18px 20px;display:none;font-size:14px;line-height:1.75}
.th-body.open{display:block}
.th-body h3{font-size:15px;font-weight:700;color:#003087;margin:14px 0 7px;border-left:3px solid #003087;padding-left:9px}
.th-body h3:first-child{margin-top:0}
.tbox{border:1px solid #D0DBF5;border-radius:6px;overflow:hidden;margin:10px 0}
.tbox-row{display:flex;border-bottom:1px solid #D0DBF5}
.tbox-row:last-child{border-bottom:none}
.tbox-label{padding:10px 12px;font-size:12px;font-weight:700;min-width:110px;display:flex;align-items:center;flex-shrink:0}
.tbox-label.green{background:#E8F5E9;color:#1B5E20}
.tbox-label.amber{background:#FFF3E0;color:#BF360C}
.tbox-label.blue{background:#E3F2FD;color:#0D47A1}
.tbox-content{padding:10px 14px;font-size:14px;color:#333;border-left:1px solid #D0DBF5}
.bl{color:#1565C0;font-weight:600}.am{color:#E65100;font-weight:600}.gr{color:#1B5E20;font-weight:600}
.tbl{width:100%;border-collapse:collapse;font-size:13px;margin:8px 0}
.tbl th{background:#003087;color:#fff;padding:7px 10px;text-align:left;font-weight:600}
.tbl td{padding:6px 10px;border-bottom:1px solid #EEE;vertical-align:top}
.tbl tr:nth-child(even) td{background:#F7F9FD}
.proto{margin:8px 0 0 20px}.proto li{margin-bottom:6px;font-size:14px}
.warn{background:#FFF8E1;border-left:4px solid #F9A825;padding:11px 14px;border-radius:0 5px 5px 0;margin:10px 0;font-size:13px;line-height:1.7}
.warn strong{color:#E65100}
.qh{background:#1E3A5F;color:#fff;padding:9px 20px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;border-top:none}
.qcount{background:rgba(255,255,255,.25);padding:2px 9px;border-radius:10px;font-size:12px}
.qb{background:#fff;border:1px solid #DDE;border-top:none}
.qb:last-of-type{border-radius:0 0 8px 8px}
.qhead{padding:11px 18px 9px;border-bottom:1px solid #F0F2F8;display:flex;align-items:center;gap:8px;flex-wrap:wrap;cursor:pointer;user-select:none}
.qhead:hover{background:#FAFBFE}
.qnum{background:#003087;color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:4px;flex-shrink:0}
.qsrc{font-size:11px;color:#777}
.dbadge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;flex-shrink:0}
.dE{background:#E3F2FD;color:#1565C0}.dM{background:#FFF3E0;color:#E65100}.dH{background:#FFEBEE;color:#C62828}
.qtbadge{font-size:11px;padding:2px 8px;border-radius:10px;background:#F3E5F5;color:#6A1B9A;flex-shrink:0}
.qchev{margin-left:auto;font-size:11px;color:#AAB;flex-shrink:0;transition:transform .2s}
.qchev.up{transform:rotate(180deg)}
.qbody{display:none;border-top:1px solid #EEF}
.qbody.open{display:block}
.qpass{background:#FAFAFA;border:1px solid #E5E8F0;border-left:3px solid #003087;margin:16px 18px 12px;padding:14px 16px;font-size:14px;line-height:1.82;border-radius:0 5px 5px 0}
.qstem{margin:0 18px 13px;font-size:14px;font-weight:700;color:#003087;padding:10px 14px;background:#EEF3FC;border-radius:5px;border-left:3px solid #003087}
.choices{list-style:none;margin:0 18px 14px}
.choices li{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1.5px solid #D5D9E8;border-radius:5px;margin-bottom:6px;cursor:pointer;font-size:14px;line-height:1.6;transition:.12s;background:#fff}
.choices li:hover{background:#F0F4FF;border-color:#90B4F7}
.choices li.sel{background:#E3F2FD;border-color:#1565C0}
.choices li.cor{background:#E8F5E9;border-color:#388E3C;pointer-events:none}
.choices li.wrn{background:#FFEBEE;border-color:#E53935;pointer-events:none}
.cl{font-weight:700;color:#003087;min-width:20px;padding-top:1px;font-size:13px;flex-shrink:0}
.cor .cl{color:#1B5E20}.wrn .cl{color:#B71C1C}
.qacts{padding:0 18px 14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.bcheck{background:#003087;color:#fff;border:none;padding:8px 18px;border-radius:5px;font-size:13px;font-weight:700;cursor:pointer;transition:.15s}
.bcheck:hover{background:#001A5F}.bcheck:disabled{opacity:.35;cursor:default}
.breveal{background:#fff;color:#003087;border:1.5px solid #003087;padding:8px 16px;border-radius:5px;font-size:13px;font-weight:700;cursor:pointer;transition:.15s}
.breveal:hover{background:#EEF3FC}
.rbadge{font-size:13px;font-weight:700;padding:5px 13px;border-radius:4px}
.rcor{background:#E8F5E9;color:#1B5E20}.rwrn{background:#FFEBEE;color:#B71C1C}
.expbox{display:none;margin:0 18px 16px;background:#F5F7FF;border:1px solid #D0DBF5;border-radius:5px;padding:13px 16px}
.expbox.open{display:block}
.explbl{font-size:11px;font-weight:700;color:#003087;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;display:flex;align-items:center;gap:6px}
.explbl::before{content:'✓';background:#003087;color:#fff;width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.expbox p{font-size:13px;line-height:1.75;color:#333;margin-bottom:5px}
.expbox p:last-child{margin-bottom:0}
.df{background:#fff;border:1px solid #DDE;border-top:1px solid #EEF;border-radius:0 0 8px 8px;padding:13px 18px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.bdone{background:#388E3C;color:#fff;border:none;padding:9px 20px;border-radius:5px;font-size:13px;font-weight:700;cursor:pointer;transition:.15s}
.bdone:hover{background:#2E7D32}.bdone.marked{background:#E0E0E0;color:#888;cursor:default}
.bnav{background:#fff;color:#003087;border:1.5px solid #003087;padding:9px 16px;border-radius:5px;font-size:13px;font-weight:700;cursor:pointer;transition:.15s}
.bnav:hover{background:#EEF3FC}.bnav:disabled{opacity:.3;cursor:default}
.bnav-r{margin-left:auto}
@media(max-width:580px){#tb h1{font-size:12px}.db{width:34px;height:34px;font-size:12px}.choices li{font-size:13px}.qpass{font-size:13px}}
</style>

<script>
const QS={'OG-620':{num:620,src:'OG',diff:'E',type:'Strengthen',p:'Arts advocate: Few universities require that students who are specializing in science and technology take many art courses. However, real progress in science and technology requires an element of creativity, which the arts foster. Thus, to help science and technology students succeed in their careers, universities should increase the number of art courses required for them.',q:'Which of the following would, if true, most strengthen the argument above?',ch:['Universities required more art courses for science and technology students in the past.','Participation in art courses increases students’ creative thinking in their science and technology courses.','More students who are interested in art would specialize in science and technology if the number of art courses required for those programs were increased.','Some of the most prominent scientists began their careers as artists.','Discussion of science and technology topics in art courses increases creative thinking among students in those courses.'],ans:1,exp:'The conclusion is: universities should require more art courses for STEM students. The GAP: Will art courses actually help in STEM careers? Answer B fills this directly — it shows art courses increase creative thinking IN science courses. E is a trap: it describes STEM topics IN art courses (reverse direction). A = past policy; C = attracting art students; D = anecdote without causation.'},'OG-621':{num:621,src:'OG',diff:'E',type:'Assumption',p:'Ramirez: The film industry claims that pirated DVDs, which are usually cheaper than legitimate DVDs and become available well before a film’s official DVD release date, adversely affect its bottom line. But the industry should note what the spread of piracy indicates: consumers want lower prices and faster DVD releases. Lowering prices of DVDs and releasing them sooner would mitigate piracy’s negative effect on film industry profits.',q:'The argument above relies on which of the following assumptions?',ch:['Releasing legitimate DVDs earlier would not cause any reduction in the revenue the film industry receives from the films’ theatrical release.','Some people who would otherwise purchase pirated DVDs would be willing to purchase legitimate DVDs if they were less expensive and released earlier than they are now.','The film industry will in the future be able to produce DVDs more cheaply than is currently the case.','Some current sellers of pirated DVDs would likely discontinue their businesses if legitimate DVDs were released faster and priced lower./2024, 22:25','Current purchasers of pirated DVDs are aware that those DVDs are not authorized by the film industry.'],ans:1,exp:'NEGATION TEST on B: \'No piracy buyer would switch to legitimate DVDs even if cheaper and released earlier.\' If true, the plan accomplishes nothing. The conclusion collapses completely. Options A, C, D, E don\'t destroy the conclusion when negated.'},'OG-622':{num:622,src:'OG',diff:'E',type:'Explain',p:'Harunia Province has a relatively dry climate and is attracting a fast-growing population that has put increasing demands on its water supply.',q:'The two companies that supply water to the region have struggled to keep up with demand and still remain profitable. Yet now they are asking Harunian authorities to write residential water-use regulations that could reduce their revenues and restrict their future flexibility in supplying water profitably. Which of the following would, if true, most logically help explain why the water-supply companies are asking the authorities to regulate residential water use?',ch:['The companies are planning large water-transportation and irrigation systems that require the approval of neighboring provinces.','The companies believe regulation is inevitable and that having it in place now will allow better planning and thus future profitability.','Few, if any, Harunian government officials have investments in the companies or serve on their boards of directors.','The companies believe that the population is not likely to continue to grow.','Long-term climate projections suggest that greater rainfall will eventually increase the amount of water available.'],ans:1,exp:'PARADOX: Companies struggling → yet ask for regulations that reduce revenue. B resolves: regulation is coming regardless, so having it now enables better long-term planning. Short-term cost buys strategic certainty.'},'OG-623':{num:623,src:'OG',diff:'E',type:'Strengthen',p:'Loss of the Gocha mangrove forests has caused coastal erosion, reducing fish populations and requiring the Gocha Fishing Cooperative (GFC) to partially fund dredging and new shore facilities. However, as part of its subsidiary businesses, the GFC has now invested in a program to replant significant parts of the coast with mangrove trees. Given income from a controlled harvest of wood with continuing replanting, the mangrove regeneration effort makes it more likely that the cooperative will increase its net income.',q:'Which of the following, if true, would most strengthen the argument that mangrove replanting will increase the Gocha cooperative’s net income?',ch:['The cost of dredging and shore facilities was shared with the local government.','The GFC will be able to hire local workers to assist with the mangrove replanting.','The GFC derives 10 percent of its revenue from salt-production facilities in an area previously cleared of mangroves.','Mangrove forests tend to increase the commercial fish populations in coastal fishing grounds.','A controlled harvesting of mangrove wood by the GFC would have little effect on coastal erosion.'],ans:3,exp:'GAP: The argument mentions only timber income, but GFC is a FISHING cooperative! D reveals the missing piece: mangroves increase fish populations → more fishing revenue. Classic GMAT pattern: notice what the argument omits.'},'OG-624':{num:624,src:'OG',diff:'E',type:'Mixed',p:'Executives at the Fizzles Beverage Company plan to boost profits in Country X on their range of fruit-flavored drinks by introducing new flavors based on tropical fruits that are little known there. The executives reason that since the fruit drinks of other companies have none of these flavors, Fizzles will not have to compete for customers and thus will be able to sell the drinks at a higher price.',q:'Which of the following, if true, presents the most serious potential weakness of the plan?',ch:['The new fruit drinks would be priced significantly higher than other Fizzles fruit drinks with more conventional flavors.','In a telephone survey, at least one of the consumers contacted said that they preferred many of the new flavors to all of the more familiar flavors./2024, 22:25','To build widespread demand for the new flavors, Fizzles would have to launch an advertising campaign to familiarize consumers with them.','Consumers choosing among fruit-flavored drinks of different brands generally buy on the basis of name recognition and price rather than the specific fruit flavor.','Few consumers who are loyal to a specific brand of fruit-flavored drinks would willingly switch to another brand that costs more.'],ans:3,exp:'The plan assumes: unique flavors → no competition → premium prices. D destroys this: consumers choose by NAME RECOGNITION and PRICE, not flavor. Fizzles\' exotic flavors give no competitive advantage.'},'OG-625':{num:625,src:'OG',diff:'E',type:'Explain',p:'Economist: In 2015, the average per-person amount paid for goods and services purchased by consumers in Country X was the equivalent of $17,570 in United States dollars, just 30 percent of the corresponding figure of $58,566 for Country Y. Yet in 2015, there was already a substantial middle class in Country X that had discretionary income for middle-class consumer goods such as new vehicles, computers, or major household appliances, while a significant portion of the middle class in Country Y did not have sufficient income to purchase such items.',q:'Which of the following, if true, most helps explain the discrepancy in the relationships described by the economist?',ch:['There are many consumer goods, such as household appliances, that are produced in Country X to be sold in the Country Y market.','The volume of trade between Country X and Country Y is increasing rapidly in both directions.','The economy of Country Y is recovering from a downturn that affected both Country Y and Country X.','Country X residents pay much less than their Country Y counterparts for housing, transportation, and child care.','In Country Y as well as in Country X, there are few assembly-line jobs in factories that pay a middle-class wage.'],ans:3,exp:'PARADOX: Country X spends only 30% of Country Y → yet X residents have MORE discretionary income. D resolves: Discretionary = Total − Necessities. Far lower necessities in X leave more for luxury goods despite lower income.'},'OG-627':{num:627,src:'OG',diff:'E',type:'Strengthen',p:'In Country X’s last election, the Reform Party beat its main opponent, the Conservative Party, although pollsters, employing in-person interviews shortly before the vote, had projected a Conservative Party victory. Afterward, the pollsters determined that, unlike Conservative Party/2024, 22:25 supporters, Reform Party supporters were less likely to express their party preference during in-person interviews than they were during telephone interviews. Therefore, using only telephone interviews instead would likely result in more accurate projections for the next election.',q:'Which of the following statements, if true, would most support the argument in the passage?',ch:['The number of voters in Country X’s next election will be significantly larger than the number of voters in the last election.','The Conservative Party will win the next election.','For each person interviewed in telephone polls before the next election, pollsters will be able to reasonably determine the likelihood of that person voting.','People who expressed no party preference during the in-person interviews shortly before Country X’s last election did not outnumber the people who expressed a preference for the Conservative Party.','In the next election, pollsters will be able to conduct more in-person interviews than telephone interviews.'],ans:2,exp:'Telephone polls must also correctly identify WHO WILL VOTE. C confirms: pollsters CAN determine likelihood of voting for telephone respondents. Without this, knowing preferences doesn\'t help predict outcomes.'},'OG-628':{num:628,src:'OG',diff:'E',type:'Weaken',p:'A company that manufactures plastic products from recyclable plastic is, surprisingly, unconcerned that economic conditions may worsen, despite analysts’ belief that consumers would then consider ecofriendly plastic products an expensive luxury. But the company reasons that it will be able to lower its prices because, in a weakened economy, other ecofriendly plastic manufacturers are likely to fail. Demand among manufacturers for recyclable plastics as raw materials would then plummet, creating an oversupply of such materials, making them less expensive for the manufacturer to purchase and thus lowering the company’s costs.',q:'Which of the following, if true, most weakens the company’s reasoning?',ch:['Smaller ecofriendly plastic manufacturers are more likely to fail in a weakened economy than larger ecofriendly manufacturers are.','Some retailers whose sales include various companies’ ecofriendly plastic products have struggled in recent years despite the overall good economy.','Consumers would likely soon learn of the oversupply of recyclable plastics and cease recycling them, significantly raising manufacturers’ raw-material costs.','Retailers, including retailers that cater to consumers seeking certain types of ecofriendly products, may lose some business if economic conditions worsen.','The plastics used by the company in its products were, after a recent investigation by a regulatory body, declared to be safe for consumers.'],ans:2,exp:'The chain: bad economy → competitors fail → less demand for recycled plastic → oversupply → cheap raw materials. C breaks it: consumers stop recycling → supply DROPS instead → expensive raw materials. The predicted oversupply becomes a shortage.'},'OG-629':{num:629,src:'OG',diff:'E',type:'Strengthen',p:'Researchers asked volunteers to imagine they were running a five-kilometer race against 50 people and then against 500 people, races in each of which the top 10 percent would receive a $1,000 prize. Asked about the effort they would apply in the respective cases, the volunteers indicated, on average, that they would run slower in the race against the greater number of people. A likely explanation of this result is that those of the volunteers who were most comparatively inclined—those who most tended to compare themselves with others in the social environment—determined (perhaps unconsciously) that extreme effort would not be worthwhile in the 500-competitor race.',q:'Which of the following would, if known to be true, most help justify the explanation offered above?/2024, 22:25?',ch:['The volunteers who were most comparatively inclined were also those who had the greatest desire to win a $1,000 prize.','The volunteers who were the least comparatively inclined had no greater desire to win the $1,000 than those who were the most comparatively inclined.','The volunteers who were most comparatively inclined were likely to indicate that they would run the two races at the same speed.','The most comparatively inclined volunteers believed that they were significantly less likely to finish in the top 10 percent in the race against 500 than in the race against 50.','Volunteers were chosen for participation in the study on the basis of answers to various questions designed to measure the degree to which the volunteers were comparatively inclined.'],ans:3,exp:'The explanation focuses on comparatively inclined volunteers. D confirms the mechanism: they believed they were much less likely to finish in the top 10% in the 500-person race. This rational calculation drives the \'not worthwhile\' conclusion.'},'OG-630':{num:630,src:'OG',diff:'E',type:'Mixed',p:'According to a study, after a week of high-altitude living, twenty men had slimmed down. The men, middle-aged residents of low-altitude areas, had been taken to a research station at 2,650 meters (8,694 feet) above sea level. They had unrestricted access to food and were forbidden vigorous exercise, yet they lost an average of 1.5 kilograms (3.3 pounds) during their one-week stay. Clearly, the lower availability of oxygen at higher altitudes, or hypobaric hypoxia, can be said to have caused the weight loss, since __________.',q:'Which of the following would, if true, most logically complete the argument?',ch:['a decrease in oxygen intake has been shown to depress appetite','the men all participated in the same kinds of exercise during their stay','the foods available to the men had fewer calories than the foods they usually ate','exercise at higher altitudes is more difficult than exercise at lower altitudes is','several weeks after returning home, the men still weighed less than they had before the study'],ans:0,exp:'The blank follows \'hypoxia caused weight loss, since ___.\' A provides the mechanism: low oxygen → depressed appetite → less food consumed → weight loss. Also explains why men lost weight despite unrestricted food access.'},'OG-631':{num:631,src:'OG',diff:'E',type:'Assumption',p:'Editorial: Our city’s public transportation agency is facing a budget shortfall. The fastestgrowing part of the budget has been employee retirement benefits, which are exceptionally generous. Unless the budget shortfall is resolved, transportation service will be cut, and many transportation employees will lose their jobs. Thus, it would be in the employees’ best interest for their union to accept cuts in retirement benefits.',q:'Which of the following is an assumption the editorial’s argument requires?',ch:['The transportation employees’ union should not accept cuts in retirement benefits if doing so would not be in the employees’ best interest.','The only feasible way for the agency to resolve the budget shortfall would involve cutting transportation service and eliminating jobs.','Other things being equal, it is in the transportation employees’ interest to have exceptionally generous retirement benefits.','Cutting the retirement benefits would help resolve the agency’s budget shortfall.','The transportation employees’ union will not accept cuts in retirement benefits if doing so will not allow more transportation employees to keep their jobs.'],ans:3,exp:'NEGATION TEST on D: \'Cutting retirement benefits would NOT help resolve the shortfall.\' The argument collapses — accepting cuts is pointless, shortfall remains, jobs are lost anyway. D is the essential bridge.'},'OG-632':{num:632,src:'OG',diff:'E',type:'Assumption',p:'Researchers hope to find clues about the A’mk peoples who lived in the Kaumpta region about one thousand years ago but who left few obvious traces. The researchers plan to hire the few remaining shamans of the modern-day indigenous people in Kaumpta, who are believed to be descended from the A’mk, to lead them to ancestral sites that may be the remains of A’mk/2024, 22:25 buildings or ceremonial spaces. The shamans were taught the location of such sites as part of their traditional training as youths, and their knowledge of traditional Kaumpta customs may help determine the nature of any sites the researchers find.',q:'Which of the following is an assumption on which the success of the plan depends?',ch:['The researchers have reliable evidence that the A’mk of one thousand years ago built important ceremonial spaces.','The shamans have a reasonably accurate memory of A’mk sites they learned about as youths.','Kaumpta shamans are generally held in high esteem for their traditional knowledge.','Modern technologies available to the researchers are likely to be able to find some A’mk sites easily.','Most or all A’mk sites are likely to be found within the Kaumpta region.'],ans:1,exp:'The entire plan depends on shamans\' memories being accurate. Negate B: \'Shamans do NOT have accurate memories.\' The plan has no mechanism for finding sites. B is foundational.'},'OG-633':{num:633,src:'OG',diff:'E',type:'Strengthen',p:'Astronomer: Most stars are born in groups of thousands, each star in a group forming from the same parent cloud of gas. Each cloud has a unique, homogeneous chemical composition. Therefore, whenever two stars have the same chemical composition as each other, they must have originated from the same cloud of gas.',q:'Which of the following, if true, would most strengthen the astronomer’s argument?',ch:['In some groups of stars, not every star originated from the same parent cloud of gas.','Clouds of gas of similar or identical chemical composition may be remote from each other.','Whenever a star forms, it inherits the chemical composition of its parent cloud of gas.','Many stars in vastly different parts of the universe are quite similar in their chemical compositions.','Astronomers can at least sometimes precisely determine whether a star has the same chemical composition as its parent cloud of gas.'],ans:2,exp:'C confirms the mechanism: stars inherit their parent cloud\'s chemical composition. Without this, the argument that same composition = same cloud breaks down. A, B, D all actually weaken by suggesting compositions aren\'t uniquely tied to specific clouds.'},'OG-634':{num:634,src:'OG',diff:'E',type:'Mixed',p:'With employer-paid training, workers have the potential to become more productive not only in their present employment but also in any number of jobs with different employers. To increase the productivity of their workforce, many firms are planning to maintain or even increase their investments in worker training. But some training experts object that if a trained worker is hired away by another firm, the employer that paid for the training has merely subsidized a competitor. They note that such hiring has been on the rise in recent years.',q:'Which of the following would, if true, contribute most to defeating the training experts’ objection to the firms’ strategy?',ch:['Firms that promise opportunities for advancement to their employees get, on average, somewhat larger numbers of job applications from untrained workers than do firms that make no such promise.','In many industries, employees who take continuing-education courses are more competitive in the job market.','More and more educational and training institutions are offering reduced tuition fees to firms that subsidize worker training.','Research shows that workers whose training is wholly or partially subsidized by their employer tend to get at least as much training as do workers who pay for all their own/2024, 22:25 training.','For most firms that invest in training their employees, the value added by that investment in employees who stay exceeds the value lost through other employees’ leaving to work for other companies.'],ans:4,exp:'E shows that for most firms, the VALUE ADDED by workers who STAY exceeds the value lost when workers leave for competitors. This defeats the objection that training only subsidizes competitors.'},'OG-635':{num:635,src:'OG',diff:'E',type:'Mixed',p:'In emerging economies in Africa and other regions, large foreign banks that were set up during the colonial era have long played a major economic role. These institutions have tended to confine their business to the wealthier of banks’ potential customers. But development of these countries’ economies requires financing of the small businesses that dominate their manufacturing, farming, and services sectors. So economic growth will be likely to occur if local banks take on this portion of the financial services markets, since __________.',q:'Which of the following completions would produce the strongest argument?',ch:['local banks tend not to strive as much as large foreign banks to diversify their investments','small farming and manufacturing businesses contribute to economic growth if they obtain adequate investment capital','large foreign banks in emerging economies could, with local employees and appropriate local consultation, profitably expand their business to less wealthy clients','some small businesses are among the wealthier customers of foreign banks in emerging economies','local banks in emerging economies tend to be less risk-averse than foreign banks'],ans:1,exp:'B provides the direct logical bridge: small businesses contribute to economic growth WHEN they get investment capital. Without B, there\'s no stated reason why financing small businesses leads to economic growth.'},'OG-636':{num:636,src:'OG',diff:'E',type:'Mixed',p:'Exporters in Country X are facing lower revenues due to a shortage of the large metal shipping containers in which they send their goods by sea to other countries. Fewer containers arrive in Country X due to reductions in imports. This has meant lost orders, costly delays, and a scramble for alternatives, such as air freight, all of which are costlier. Moreover, the revenues of exporters in Country X will probably continue to decline in the near future. This is because other countries are likely to find it increasingly unprofitable to export their goods to Country X, and because __________.',q:'Which of the following would most logically complete the passage?',ch:['production of shipping containers in Country X is growing rapidly as a response to the shortage','shipping companies are willing to move containers from country to country only when the containers are full','the cost of shipping alternatives such as air freight is likely to stabilize in the near future','consumers in Country X are purchasing more products than ever before','the worldwide demand for goods made in Country X has only recently begun to rise after a long decline'],ans:1,exp:'Official answer: B. See Official Guide explanation for full analysis.'},'OG-637':{num:637,src:'OG',diff:'E',type:'Strengthen',p:'Candle Corporation’s television stations are likely to have more income from advertisers than previously. This is because advertisers prefer to reach people in the 18- to 49-year-old age group and the number of people in that group watching Candle television is increasing. Furthermore, among Candle viewers, the percentage of viewers 18 to 49 years old is increasing.',q:'Which of the following, if true, would most strengthen the argument that Candle Corporation will receive more income from advertisers?/2024, 22:25?',ch:['Advertisers carefully monitor the demographic characteristics of television audiences and purchase advertising time to reach the audiences they prefer to reach.','Among people over 49 years old, fewer viewers of Candle stations buy products advertised on television than do viewers of other stations.','There will be increasingly more advertisements on television that are directed at viewers who are over 49 years old.','Candle stations plan to show reruns of television shows during hours when other stations run shows for the first time.','People 18 to 49 years old generally have less disposable income to spend than do people over 49 years old.'],ans:0,exp:'A confirms: advertisers carefully monitor demographics and DO purchase time accordingly. This directly connects \'more 18–49 viewers\' to \'more advertising revenue.\''},'OG-639':{num:639,src:'OG',diff:'E',type:'Weaken',p:'Editorial: The roof of Northtown’s municipal equipment-storage building collapsed under the weight of last week’s heavy snowfall. The building was constructed recently and met local building-safety codes in every particular, except that the nails used for attaching roof supports to the building’s columns were of a smaller size than the codes specify for this purpose. Clearly, this collapse exemplifies how even a single, apparently insignificant departure from safety standards can have severe consequences.',q:'Which of the following, if true, most seriously weakens the editorial’s argument?',ch:['The only other buildings to suffer roof collapses from the weight of the snowfall were older buildings constructed according to less exacting standards than those in the codes.','The amount of snow that accumulated on the roof of the equipment-storage building was greater than the predicted maximum that was used in drawing up the safety codes.','Because the equipment-storage building was not intended for human occupation, some safety-code provisions that would have applied to an office building did not apply to it.','The municipality of Northtown itself has the responsibility for ensuring that buildings constructed within its boundaries meet the provisions of the building-safety codes.','Because the equipment-storage building was used for storing snow-removal equipment, the building was almost completely empty when the roof collapsed./2024, 22:25'],ans:1,exp:'B provides an alternative cause: the snowfall exceeded what safety codes were designed to handle. Even a fully code-compliant building would have collapsed under such extreme snow. The nail violation is irrelevant when the snow exceeds the design maximum.'},'OG-640':{num:640,src:'OG',diff:'E',type:'Complete',p:'Political theorist: Even with the best spies, area experts, and satellite surveillance, foreign policy assessments can still lack important information. In such circumstances intuitive judgment is vital. A national leader with such judgment can make good decisions about foreign policy even when current information is incomplete, since __________.',q:'Which of the following, if true, most logically completes the argument?',ch:['the central reason for failure in foreign policy decision making is the absence of critical information','those leaders whose foreign policy decisions have been highly ranked have also been found to have good intuitive judgment','both intuitive judgment and good information are required for sound decision-making','good foreign policy decisions often lead to improved methods of gathering information','intuitive judgment can produce good decisions based on past experience, even when there are important gaps in current information'],ans:4,exp:'E provides the mechanism: intuition draws on PAST EXPERIENCE to fill gaps in CURRENT information. This is exactly how intuitive judgment enables good decisions despite incomplete information.'},'OG-641':{num:641,src:'OG',diff:'E',type:'Strengthen',p:'Supply shortages and signs of growing demand are driving cocoa prices upward. Unusually severe weather in cocoa-producing regions—too much rain in Brazil and too little in West Africa—has limited production. Further, Europe and North America recently reported stronger demand for cocoa. In the first quarter, grinding of cocoa beans—the first stage in processing cocoa for chocolate—rose 8.1 percent in Europe and 16 percent in North America. Analysts have concluded that cocoa’s price will continue to rise at least into the near future.',q:'Which of the following would, if true, most strengthen the reasoning above?',ch:['Ground cocoa beans can be stored for long periods before they spoil.','Several European and North American manufacturers that use cocoa have recently improved their processing capacity.','It takes new cocoa trees five or six years before they start bearing fruit.','Governments in Europe and North America are likely to change current restrictions on cocoa imports.','Historically, cocoa production has varied widely from year to year.'],ans:2,exp:'C eliminates the possibility of quick supply recovery: new trees take 5–6 years to produce. The supply shortage is locked in long-term, ensuring continued price rises.'},'OG-642':{num:642,src:'OG',diff:'E',type:'Explain',p:'During the earliest period of industrialization in Britain, steam engines were more expensive to build and operate than either windmills or water mills, the other practicable sources of power for factories. Yet despite their significant cost disadvantage, steam-powered factories were built in large numbers well before technical improvements brought their cost down. Furthermore, they were built even in regions where geographical conditions permitted the construction of wind- and water-powered factories close to major markets.',q:'Which of the following, if true, most helps to explain the proliferation of steam-powered factories during the earliest period of industrialization in Britain?',ch:['In many areas of Britain, there were fewer steam-powered factories than wind- or waterpowered factories in the earliest period of industrialization.','Unlike wind- or water-powered factories, steam-powered factories were fueled with coal, which sometimes had to be transported significant distances from the mine to the site of the factory.','It was both difficult and expensive to convert a factory from wind power or water power to steam power./2024, 22:25','In the early period of industrialization, many goods sold in towns and cities could not be mass-produced in factories.','In Britain, the number of sites where a wind- or water-powered factory could be built was insufficient to provide for all of the demand for factory-produced goods at the time.'],ans:4,exp:'E resolves the paradox: there weren\'t ENOUGH good wind/water sites to meet all demand. Steam was necessary even though more expensive, because the cheaper alternatives had limited geographic availability.'},'OG-643':{num:643,src:'OG',diff:'E',type:'Strengthen',p:'Snowmaking machines work by spraying a mist that freezes immediately on contact with cold air. Because the sudden freezing kills bacteria, QuickFreeze is planning to market a wastewater purification system that works on the same principle. The process works only when temperatures are cold, however, so municipalities using it will still need to maintain a conventional system.',q:'Which of the following, if true, provides the strongest grounds for a prediction that municipalities will buy QuickFreeze’s purification system despite the need to maintain a conventional purification system as well?',ch:['Bacteria are not the only impurities that must be removed from wastewater.','Many municipalities have old wastewater purification systems that need to be replaced.','Conventional wastewater purification systems have not been fully successful in killing bacteria at cold temperatures.','During times of warm weather, when it is not in use, QuickFreeze’s purification system requires relatively little maintenance.','Places where the winters are cold rarely have a problem of water shortage.'],ans:2,exp:'C provides the compelling reason: conventional systems FAIL to kill bacteria in cold weather — exactly when QuickFreeze is most effective. Together they provide year-round complete coverage.'},'OG-644':{num:644,src:'OG',diff:'E',type:'Analysis',p:'Plant scientists have used genetic engineering on seeds to produce crop plants that are highly resistant to insect damage. Unfortunately, the seeds themselves are quite expensive, and the plants require more fertilizer and water to grow well than normal ones. Accordingly, for most farmers the savings on pesticides would not compensate for the higher seed costs and the cost of additional fertilizer. However, since consumer demand for grains, fruits, and vegetables grown without the use of pesticides continues to rise, the use of genetically engineered seeds of this kind is likely to become widespread.',q:'In the argument given, the two portions in boldface play which of the following roles?',ch:['The first supplies a context for the argument; the second is the argument’s main conclusion.','The first introduces a development that the argument predicts will have a certain outcome; the second is a state of affairs that, according to the argument, contributes to bringing about that outcome.','The first presents a development that the argument predicts will have a certain outcome; the second acknowledges a consideration that tends to weigh against that prediction.','The first provides evidence to support a prediction that the argument seeks to defend; the second is that prediction.','The first and the second each provide evidence to support the argument’s main conclusion.'],ans:2,exp:'First bold introduces the insect-resistant development; second bold describes the rising consumer demand that contributes to the predicted widespread adoption. Official answer: C.'},'OG-645':{num:645,src:'OG',diff:'E',type:'Complete',p:'',q:'Which of the following most logically completes the passage? Leptin, a protein occurring naturally in the blood, appears to regulate how much fat the body carries by speeding up the metabolism and decreasing the appetite when the body has too much fat. Mice that do not naturally produce leptin have more fat than other mice, but they lose fat rapidly when they are given leptin injections. Unfortunately, however, leptin cannot be used as a dietary supplement to control fat, since __________./2024, 22:25?',ch:['the digestive system breaks down proteins before they can enter the bloodstream','there are pharmaceuticals already available that can contribute to weight loss by speeding up the metabolism','people with unusually low levels of leptin in their blood tend to have a high percentage of body fat','the mice that do not naturally produce leptin were from a specially bred strain of mice','mice whose bodies did produce leptin also lost some of their body fat when given leptin injections'],ans:0,exp:'A explains why oral leptin fails: the digestive system BREAKS DOWN proteins before they can enter the bloodstream. Injections bypass digestion; oral supplements are destroyed by digestion.'},'OG-646':{num:646,src:'OG',diff:'E',type:'Explain',p:'Suncorp, a new corporation with limited funds, has been clearing large sections of the tropical Amazon forest for cattle ranching. This practice continues even though greater profits can be made from rubber tapping, which does not destroy the forest, than from cattle ranching, which does destroy the forest.',q:'Which of the following, if true, most helps to explain why Suncorp has been pursuing the less profitable of the two economic activities mentioned above?',ch:['The soil of the Amazon forest is very rich in nutrients that are important in the development of grazing lands.','Cattle-ranching operations that are located in tropical climates are more profitable than cattle-ranching operations that are located in cold-weather climates.','In certain districts, profits made from cattle ranching are more heavily taxed than profits made from any other industry.','Some of the cattle that are raised on land cleared in the Amazon are killed by wildcats.','The amount of money required to begin a rubber-tapping operation is twice as high as the amount needed to begin a cattle ranch.'],ans:4,exp:'The paradox: rubber tapping earns MORE → yet Suncorp does cattle ranching. Key: \'limited funds.\' E resolves: rubber tapping requires TWICE the startup capital. A cash-strapped new company can only afford the cheaper option.'},'OG-647':{num:647,src:'OG',diff:'E',type:'Mixed',p:'Archaeologists use technology to analyze ancient sites. It is likely that this technology will advance considerably in the near future, allowing archaeologists to gather more information than is currently possible. If they study certain sites now, they risk contaminating or compromising them for future studies. Therefore, in order to maximize the potential for gathering knowledge in the long run, a team of archaeologists plans to delay the examination of a newly excavated site.',q:'Which of the following would be most useful to investigate for the purpose of evaluating the plan’s prospects for achieving its goal?',ch:['Whether any of the contents of the site will significantly deteriorate before the anticipated technology is available','Whether there will continue to be improvements on the relevant technology','Whether the team can study a site other than the newly excavated site for the time being','Whether the site was inhabited by a very ancient culture','Whether the anticipated technology will damage objects under study'],ans:0,exp:'A directly addresses whether sites will DETERIORATE before better technology arrives. If sites decay while waiting, there\'s nothing to examine with improved technology. This is the most relevant factor for evaluating the plan\'s viability.'},'OG-648':{num:648,src:'OG',diff:'E',type:'Strengthen',p:'More and more law firms specializing in corporate taxes are paid on a contingency-fee basis. Under this arrangement, if a case is won, the firm usually receives more than it would have received if it had been paid on the alternate hourly rate basis. If the case is lost, the firm receives nothing. Most firms are likely to make more under the contingency-fee arrangement.',q:'Which of the following, if true, would most strengthen the prediction above?/2024, 22:25?',ch:['Firms that work exclusively under the hourly rate arrangement spend, on average, fewer hours on cases that are won than on cases that are lost.','Some litigation can last for years before any decision is reached, and, even then, the decision may be appealed.','Firms under the contingency-fee arrangement still pay their employees on an hourly basis.','Since the majority of firms specialize in certain kinds of cases, they are able to assess accurately their chances of winning each potential case.','Firms working under the contingency-fee arrangement take in fewer cases per year than do firms working under the hourly rate arrangement.'],ans:3,exp:'D confirms: firms can accurately assess which cases they\'ll WIN. So they only accept high-win-probability cases, screening out losers. This directly supports \'most firms will earn more.\''},'OG-649':{num:649,src:'OG',diff:'E',type:'Weaken',p:'Pretzel vendor: The new license fee for operating a pretzel stand outside the art museum is prohibitively expensive. Charging typical prices, I would need to sell an average of 25 pretzels per hour to break even. At my stand outside City Hall, with about as many passers-by as at the art museum, I average only 15 per hour. So I could not break even running a stand outside the art museum, much less turn a profit.',q:'Which of the following, if true, most seriously weakens the pretzel vendor’s argument?',ch:['The pretzel vendor does not sell anything other than pretzels.','People who visit the art museum are more likely to buy pretzels than are people who go to City Hall.','The license fee for operating a pretzel stand outside City Hall will not increase.','People who buy pretzels at pretzel stands are more likely to do so during the lunch hour than at other times.','The city will grant more licenses for pretzel stands outside the art museum than the number it grants for stands outside City Hall.'],ans:1,exp:'B destroys the comparison: museum visitors are MORE LIKELY to buy pretzels than City Hall visitors. Same foot traffic × higher purchase rate = the vendor could easily reach 25/hour at the museum.'},'OG-650':{num:650,src:'OG',diff:'E',type:'Explain',p:'Beginning in 1966, all new cars sold in Morodia were required to have safety belts and power steering. Previously, most cars in Morodia were without these features. Safety belts help to prevent injuries in collisions, and power steering helps to avoid collisions in the first place. But even though in 1966 one-seventh of the cars in Morodia were replaced with new cars, the number of car collisions and collision-related injuries did not decline.',q:'Which of the following, if true about Morodia, most helps to explain why the number of collisions and collision-related injuries in Morodia failed to decline in 1966?',ch:['Because of a driver-education campaign, most drivers and passengers in cars that did have safety belts used them in 1966.','Most of the new cars bought in 1966 were bought in the months of January and February.','In 1965, substantially more than one-seventh of the cars in Morodia were replaced with new cars.','An excessive reliance on the new safety features led many owners of new cars to drive less cautiously in 1966 than before.','The seat belts and power steering put into new cars sold in 1966 had to undergo strict quality-control inspections by manufacturers, whether the cars were manufactured in Morodia or not./2024, 22:25'],ans:3,exp:'D explains via risk compensation: owners of safer cars drove MORE RECKLESSLY, exactly offsetting the safety features. The safety gains were cancelled by behavioral changes.'},'OG-651':{num:651,src:'OG',diff:'E',type:'Strengthen',p:'Manufacturers of mechanical pencils make most of their profit on pencil leads rather than on the pencils themselves. The Write Company, which cannot sell its leads as cheaply as other manufacturers can, plans to alter the design of its mechanical pencil so that it will accept only a newly designed Write Company lead, which will be sold at the same price as the Write Company’s current lead.',q:'Which of the following, if true, most strongly supports the Write Company’s projection that its plan will lead to an increase in its sales of pencil leads?',ch:['The new Write Company pencil will be introduced at a price higher than the price the Write Company charges for its current model.','In the foreseeable future, manufacturers of mechanical pencils will probably have to raise the prices they charge for mechanical pencils.','The newly designed Write Company lead will cost somewhat more to manufacture than the Write Company’s current lead does.','A rival manufacturer recently announced similar plans to introduce a mechanical pencil that would accept only the leads produced by that manufacturer.','In extensive test marketing, mechanical-pencil users found the new Write Company pencil markedly superior to other mechanical pencils they had used.'],ans:4,exp:'E is critical: test marketing shows users prefer the new pencil MARKEDLY. If people buy it, they\'re locked into Write Company leads. Without E, no one buys the pencil → no captive lead market.'},'OG-652':{num:652,src:'OG',diff:'E',type:'Strengthen',p:'Enterprise Bank currently requires customers with checking accounts to maintain a minimum balance or pay a monthly fee. Enterprise plans to offer accounts with no monthly fee and no minimum-balance requirement; to cover their projected administrative costs of $3 per account per month, they plan to charge $30 for overdrawing an account. Since each month on average slightly more than 10 percent of Enterprise’s customers overdraw their accounts, bank officials predict the new accounts will generate a profit.',q:'Which of the following, if true, most strongly supports the bank officials’ prediction?',ch:['Some of Enterprise Bank’s current checking account customers are expected to switch to the new accounts once they are offered.','One-third of Enterprise Bank’s revenues are currently derived from monthly fees tied to checking accounts.','Many checking account customers who occasionally pay a fee for not maintaining a minimum balance in their account generally maintain a balance well above the minimum.','Customers whose checking accounts do not have a minimum-balance requirement are more likely than others to overdraw their checking accounts.','Customers whose checking accounts do not have a minimum-balance requirement are more likely than others to write checks for small amounts.'],ans:3,exp:'D says: customers without minimum balance requirements overdraw MORE often. New accounts have no minimum balance → higher overdraft rate → more than $3/account in fees → profit.'},'OG-653':{num:653,src:'OG',diff:'E',type:'Mixed',p:'Highway official: When resurfacing our concrete bridges, we should use electrically conductive concrete (ECC) rather than standard concrete. In the winter, ECC can be heated by passing an electric current through it, thereby preventing ice buildup. The cost of the electricity needed is substantially lower than the cost of the deicing salt we currently use. Taxpayer: But ECC is vastly more expensive than standard concrete, so your proposal is probably not justifiable on economic grounds.',q:'Which of the following, if true, could best be used by the highway official to support the official’s proposal in the face of the taxpayer’s objection?',ch:['The use of deicing salt causes corrosion of reinforcing steel in concrete bridge decks and damage to the concrete itself, thereby considerably shortening the useful life of concrete/2024, 22:25 bridges.','Severe icing conditions can cause power outages and slow down the work of emergency crews trying to get power restored.','In weather conditions conducive to icing, ice generally forms on the concrete surfaces of bridges well before it forms on parts of the roadway that go over solid ground.','Aside from its potential use for deicing bridges, ECC might also be an effective means of keeping other concrete structures such as parking garages and airport runways ice free.','If ECC were to be used for a bridge surface, the electric current would be turned on only at times at which ice was likely to form.'],ans:0,exp:'A: Deicing salt corrodes reinforcing steel and damages concrete, significantly shortening bridge life. The cost of premature bridge replacement far exceeds the higher upfront cost of ECC. This addresses the taxpayer\'s economic objection directly.'},'OG-654':{num:654,src:'OG',diff:'E',type:'Flaw',p:'In virtually any industry, technological improvements increase labor productivity, which is the output of goods and services per person-hour worked. In Parland’s industries, labor productivity is significantly higher than it is in Vergia’s industries. Clearly, therefore, Parland’s industries must, on the whole, be further advanced technologically than Vergia’s are.',q:'The argument is most vulnerable to which of the following criticisms?',ch:['It offers a conclusion that is no more than a paraphrase of one of the pieces of information provided in its support.','It presents as evidence in support of a claim information that is inconsistent with other evidence presented in support of the same claim.','It takes one possible cause of a condition to be the actual cause of that condition without considering any other possible causes.','It takes a condition to be the effect of something that happened only after the condition already existed.','It makes a distinction that presupposes the truth of the conclusion that is to be established.'],ans:2,exp:'C: The argument treats technology as THE cause of higher productivity without considering any other possible causes — better education, culture, management, etc. Classic flaw: one possible cause assumed to be the actual cause.'},'OG-655':{num:655,src:'OG',diff:'E',type:'Analysis',p:'Chaco Canyon, a settlement of the ancient Anasazi culture in North America, had massive buildings. It must have been a major Anasazi center. Analysis of wood samples shows that some of the timber for the buildings came from the Chuska and San Mateo mountains, 50 miles from Chaco Canyon. Only a major cultural center would have the organizational power to import timber from 50 miles away.',q:'In the argument given, the two portions in boldface play which of the following roles?',ch:['The first is a premise used to support the argument’s main conclusion; the second is the argument’s main conclusion.','The first is the argument’s main conclusion; the second is a premise used to support that conclusion.','The first is one of two premises used to support the argument’s main conclusion; the second is the other of those two premises.','The first is a premise used to support the argument’s main conclusion; the second is a premise used to support another conclusion drawn in the argument.','The first is inferred from another statement in the argument; the second is inferred from the first.'],ans:1,exp:'Official answer: B. See Official Guide explanation for full analysis.'},'OG-656':{num:656,src:'OG',diff:'E',type:'Mixed',p:'The Maxilux car company’s design for its new luxury model, the Max 100, included a special design for the tires that was intended to complement the model’s image. The winning bid for supplying these tires was submitted by Rubco. Analysts concluded that the bid would only just/2024, 22:25 cover Rubco’s costs on the tires, but Rubco executives claim that winning the bid will actually make a profit for the company.',q:'Which of the following, if true, most strongly justifies the claim made by Rubco’s executives?',ch:['In any Maxilux model, the spare tire is exactly the same make and model as the tires that are mounted on the wheels.','Rubco holds exclusive contracts to supply Maxilux with the tires for a number of other models made by Maxilux.','The production facilities for the Max 100 and those for the tires to be supplied by Rubco are located very near each other.','When people who have purchased a carefully designed luxury automobile need to replace a worn part of it, they almost invariably replace it with a part of exactly the same make and type.','When Maxilux awarded the tire contract to Rubco, the only criterion on which Rubco’s bid was clearly ahead of its competitors’ bids was price.'],ans:3,exp:'D reveals the real profit source: luxury car owners almost always replace worn parts with exactly the same brand. Rubco sells replacement tires at full market price, not the slim-margin bid price. The initial contract is a \'loss leader.\''},'OG-657':{num:657,src:'OG',diff:'E',type:'Complete',p:'',q:'Which of the following most logically completes the passage? Most bicycle helmets provide good protection for the top and back of the head but little or no protection for the temple regions on the sides of the head. A study of head injuries resulting from bicycle accidents showed that a large proportion were caused by blows to the temple area. Therefore, if bicycle helmets protected this area, the risk of serious head injury in bicycle accidents would be greatly reduced, especially since __________.?',ch:['among the bicyclists included in the study’s sample of head injuries, only a very small proportion had been wearing a helmet at the time of their accident','even those bicyclists who regularly wear helmets have a poor understanding of the degree and kind of protection that helmets afford','a helmet that included protection for the temples would have to be somewhat larger and heavier than current helmets','the bone in the temple area is relatively thin and impacts in that area are thus very likely to cause brain injury','bicyclists generally land on their arm or shoulder when they fall to the side, which reduces the likelihood of severe impacts on the side of the head'],ans:3,exp:'D amplifies \'greatly reduced\': temple bone is THIN → even minor impacts there are VERY LIKELY to cause brain injury. This makes temple protection especially valuable per impact prevented.'},'OG-658':{num:658,src:'OG',diff:'E',type:'Complete',p:'',q:'Which of the following most logically completes the argument? In a typical year, Innovair’s airplanes are involved in 35 collisions while parked or being towed in airports, with a resulting yearly cost of $1,000,000 for repairs. To reduce the frequency of ground collisions, Innovair will begin giving its ground crews additional training, at an annual cost of $500,000. Although this will cut the number of ground collisions by about half at best, the drop in repair costs can be expected to be much greater, since __________.?',ch:['most ground collisions happen when ground crews are rushing to minimize the time a delayed airplane spends on the ground','a ground collision typically occurs when there are no passengers on the airplane','the additional training will focus on helping ground crews avoid those kinds of ground collisions that cause the most costly damage/2024, 22:25','the $500,000 cost figure for the additional training of ground crews includes the wages that those crews will earn during the time spent in actual training','most ground collisions have been caused by the least experienced ground-crew members'],ans:2,exp:'C: Training specifically targets the MOST COSTLY collisions. Eliminating expensive collisions while keeping cheap ones means 50% fewer collisions → more than 50% cost reduction.'},'OG-659':{num:659,src:'OG',diff:'E',type:'Strengthen',p:'Many agriculturally intensive areas of the world are beginning to encounter water scarcity problems. As a result, many farmers in these areas are likely to reduce their output as the water supply they need in order to maintain production shrinks. However, one group of farmers in such a region plans to increase their production by implementing techniques for water conservation.',q:'Which of the following, if true, would most strongly support the prediction that the group’s plan will succeed?',ch:['Farmers that can gain a larger share of the food market in their regions will be better positioned to control more water resources.','Most agricultural practices in areas with water shortages are water-intensive.','Other regions of the world not facing water shortages are likely to make up for the reduction in agricultural output.','Demand for agricultural products in the group’s region is not expected to decline.','More than half the water used for agriculture in the farmers’ region is lost to evaporation or leakage from irrigation channels.'],ans:4,exp:'E is critical: more than HALF of current water is being WASTED. Conservation techniques have enormous potential. Even modest improvements free up huge amounts of water for expanded production.'},'OG-660':{num:660,src:'OG',diff:'E',type:'Explain',p:'Hollywood restaurant is replacing some of its standard tables with tall tables and stools. The restaurant already fills every available seat during its operating hours, and the change in seating arrangements will not result in an increase in the restaurant’s seating capacity. Nonetheless, the restaurant’s management expects revenue to increase as a result of the seating change without any concurrent change in menu, prices, or operating hours.',q:'Which of the following, if true, provides the best reason for the expectation?',ch:['One of the taller tables takes up less floor space than one of the standard tables.','Diners seated on stools typically do not linger over dinner as long as diners seated at standard tables.','Since the restaurant will replace only some of its standard tables, it can continue to accommodate customers who do not care for the taller tables.','Few diners are likely to avoid the restaurant because of the new seating arrangement.','The standard tables being replaced by tall tables would otherwise have to be replaced with new standard tables at a greater expense.'],ans:1,exp:'B resolves via table TURNOVER: if stool diners leave faster, each seat is used more times per night. Same seats × more seatings = more customers = more revenue.'},'OG-661':{num:661,src:'OG',diff:'E',type:'Strengthen',p:'A major network news organization experienced a drop in viewership in the week following the airing of a controversial report on the economy. The network also received a very large number of complaints regarding the report. The network, however, maintains that negative reactions to the report had nothing to do with its loss of viewers.',q:'Which of the following, if true, most strongly supports the network’s position?',ch:['The other major network news organizations reported similar reductions in viewership during the same week.','The viewers who registered complaints with the network were regular viewers of the news organization’s programs.','Major network news organizations publicly attribute drops in viewership to their own reports only when they receive complaints about those reports./2024, 22:25','This was not the first time that this network news organization has aired a controversial report on the economy that has inspired viewers to complain to the network.','Most network news viewers rely on network news broadcasts as their primary source of information regarding the economy.'],ans:0,exp:'A: ALL major networks lost viewers that same week. This implies an external factor — not this network\'s report — caused the decline. The drop is industry-wide, not specific to this network.'},'OG-662':{num:662,src:'OG',diff:'E',type:'Mixed',p:'Only a reduction of 10 percent in the number of scheduled flights using Greentown’s airport will allow the delays that are so common there to be avoided. Hevelia airstrip, 40 miles away, would, if upgraded and expanded, be an attractive alternative for fully 20 percent of the passengers using Greentown airport. Nevertheless, experts reject the claim that turning Hevelia into a full-service airport would end the chronic delays at Greentown.',q:'Which of the following, if true, most helps to justify the experts’ position?',ch:['Turning Hevelia into a full-service airport would require not only substantial construction at the airport itself but also the construction of new access highways.','A second largely undeveloped airstrip close to Greentown airport would be a more attractive alternative than Hevelia for many passengers who now use Greentown.','Hevelia airstrip lies in a relatively undeveloped area but would, if it became a full-service airport, be a magnet for commercial and residential development.','If an airplane has to wait to land, the extra jet fuel required adds significantly to the airline’s costs.','Several airlines use Greentown as a regional hub, so that most flights landing at Greentown have many passengers who then take different flights to reach their final destinations.'],ans:4,exp:'E: Many Greentown flights connect passengers to other flights (hub function). These passengers can\'t switch to Hevelia because their connecting flights are at Greentown. An alternative airport doesn\'t help hub passengers.'},'OG-663':{num:663,src:'OG',diff:'E',type:'Assumption',p:'Farmer: Worldwide, just three grain crops—rice, wheat, and corn—account for most human caloric intake. To maintain this level of caloric intake and also keep pace with global population growth, yields per acre from each of these crops will have to increase at least 1.5 percent every year, given that the supply of cultivated land is diminishing. Therefore, the government should increase funding for research into new ways to improve yields.',q:'Which of the following is an assumption on which the farmer’s argument depends?',ch:['It is solely the government’s responsibility to ensure that the amount of rice, wheat, and corn produced worldwide keeps pace with global population growth.','Increasing government funding for research into new ways to improve the yields per acre of rice, wheat, and corn crops would help to increase total worldwide annual production of food from these crops.','Increasing the yields per acre of rice, wheat, and corn is more important than increasing the yields per acre of other crops.','Current levels of funding for research into ways of improving grain crop yields per acre have enabled grain crop yields per acre to increase by more than 1.5 percent per year worldwide.','In coming decades, rice, wheat, and corn will become a minor part of human caloric intake, unless there is government-funded research to increase their yields per acre.'],ans:1,exp:'Negate B: \'More government research funding would NOT help increase yields.\' The recommendation is pointless. The argument requires B as the essential link between \'need higher yields\' and \'fund research.\''},'OG-664':{num:664,src:'OG',diff:'E',type:'Strengthen',p:'The air quality board recently informed Coffee Roast, a small coffee roasting firm, of a complaint regarding the smoke from its roaster. Recently enacted air quality regulations require machines roasting more than 10 pounds of coffee to be equipped with expensive smoke-dissipating afterburners. The firm, however, roasts only 8 pounds of coffee at a time. Nevertheless, the company has decided to purchase and install an afterburner./2024, 22:25',q:'Which of the following, if true, most strongly supports the firm’s decision?',ch:['Until settling on the new air quality regulations, the board had debated whether to require afterburners for machines roasting more than 5 pounds of coffee at a time.','Coffee roasted in a machine equipped with an afterburner has its flavor subtly altered.','The cost to the firm of an afterburner is less than the cost of replacing its roaster with a smaller one.','Fewer complaints are reported in areas that maintain strict rules regarding afterburners.','The firm has reason to fear that negative publicity regarding the complaints could result in lost sales.'],ans:4,exp:'E: The firm fears negative publicity from the complaint could result in lost sales that would far exceed the cost of an afterburner. Voluntary installation makes business sense even without legal obligation.'},'OG-665':{num:665,src:'OG',diff:'E',type:'Mixed',p:'People who do regular volunteer work tend to live longer, on average, than people who do not. It has been found that “doing good,” a category that certainly includes volunteer work, releases endorphins, the brain’s natural opiates, which induce in people a feeling of wellbeing. Clearly, there is a connection: regular releases of endorphins must in some way help to extend people’s lives.',q:'Which of the following, if true, most seriously undermines the force of the evidence given as support for the hypothesis that endorphins promote longevity?',ch:['People who do regular volunteer work are only somewhat more likely than others to characterize the work they do for a living as “doing good.”','Although extremely high levels of endorphins could be harmful to health, such levels are never reached as a result of the natural release of endorphins.','There are many people who have done some volunteer work but who do not do such work regularly.','People tend not to become involved in regular volunteer work unless they are healthy and energetic to begin with.','Releases of endorphins are responsible for the sense of well-being experienced by many long-distance runners while running.'],ans:3,exp:'D attacks via REVERSE CAUSATION: only already-healthy people choose to do regular volunteer work. Their longer lives are explained by pre-existing health — not by volunteering or endorphins.'},'OG-666':{num:666,src:'OG',diff:'E',type:'Explain',p:'A study compared a sample of Swedish people older than 75 who needed in-home assistance with a similar sample of Israeli people. The people in the two samples received both informal assistance, provided by family and friends, and formal assistance, professionally provided. Although Sweden and Israel have equally well-funded and comprehensive systems for providing formal assistance, the study found that the people in the Swedish sample received more formal assistance, on average, than those in the Israeli sample.',q:'Which of the following, if true, does most to explain the difference that the study found?',ch:['A companion study found that among children needing special in-home care, the amount of formal assistance they received was roughly the same in Sweden as in Israel.','More Swedish than Israeli people older than 75 live in rural areas where formal assistance services are sparse or nonexistent.','Although in both Sweden and Israel much of the funding for formal assistance ultimately comes from the central government, the local structures through which assistance is delivered are different in the two countries.','In recent decades, the increase in life expectancy of someone who is 75 years old has been greater in Israel than in Sweden./2024, 22:25','In Israel, people older than 75 tend to live with their children, whereas in Sweden people of that age tend to live alone.'],ans:4,exp:'E resolves: in Israel, elderly live WITH children who provide informal care → they need LESS formal help. In Sweden, elderly live ALONE → rely entirely on formal services. Same system quality, different DEMAND.'},'OG-667':{num:667,src:'OG',diff:'E',type:'Mixed',p:'Film director: It is true that certain characters and plot twists in my newly released film The Big Heist are similar to characters and plot twists in Thieves, a movie that came out last year. Pointing to these similarities, the film studio that produced Thieves is now accusing me of taking ideas from that film. The accusation is clearly without merit. All production work on The Big Heist was actually completed months before Thieves was released.',q:'Which of the following, if true, provides the strongest support for the director’s position?',ch:['Before Thieves began production, its script had been circulating for several years among various film studios, including the studio that produced The Big Heist.','The characters and plot twists that are most similar in the two films have close parallels in many earlier films of the same genre.','The film studio that produced Thieves seldom produces films in this genre.','The director of Thieves worked with the director of The Big Heist on several earlier projects.','Production work on Thieves began before production work on The Big Heist was started.'],ans:1,exp:'B: The similar plot elements appear in MANY earlier films of the same genre. Both directors could have independently used the same genre conventions. The director couldn\'t have copied something already in the genre.'},'OG-668':{num:668,src:'OG',diff:'E',type:'Mixed',p:'In Mernia, commercial fossil hunters often sell important fossils they have found, not to universities or museums but to individual collectors, who pay much better but generally do not allow researchers access to their collections. To increase the number of fossils available for research, some legislators propose requiring all fossils that are found in Mernia to be sold only to universities or museums.',q:'Which of the following, if true, most strongly indicates that the legislators’ proposal will fail to achieve its goal?',ch:['Some fossil hunters in Mernia are not commercial fossil hunters, but rather are amateurs who keep the fossils that they find.','Most fossils found in Mernia are common types that have little scientific interest.','Commercial fossil hunters in Mernia currently sell some of the fossils they find to universities and museums.','Many universities in Mernia do not engage in fossil research.','Most fossils are found by commercial fossil hunters, and they would give up looking for fossils if they were no longer allowed to sell to individual collectors.'],ans:4,exp:'E reveals the fatal flaw: commercial hunters would STOP HUNTING if they can\'t sell to high-paying collectors. Result: FEWER fossils found — the exact opposite of the goal.'},'OG-670':{num:670,src:'OG',diff:'E',type:'Strengthen',p:'Brown tides are growths of algae on the sea’s surface that prevent sunlight from reaching marine plants below, thereby destroying not only the plants but also the shellfish that live off these plants. Biologists recently isolated a virus that, when added to seawater, kills the algae that cause brown tides. Adding large quantities of this virus to waters affected by brown tides will therefore make it possible to save the populations of shellfish that inhabit those waters.',q:'Which of the following, if true, provides the most support for the conclusion of the argument?',ch:['When applied in large quantities, the virus not only kills the algae that cause brown tides but also many harmless kinds of algae.','Marine animals that prey on shellfish avoid areas of the sea in which brown tides are occurring.','The number of different kinds of viruses present in seawater is far gr
